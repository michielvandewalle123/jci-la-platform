<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JCI Vlaanderen LA-platform</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>/* Mobile base fixes */
html,body{overflow:hidden;height:100%;-webkit-text-size-adjust:100%;}

/* JCI Brand - Plus Jakarta Sans */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

/* JCI Ripple decoration */
.jci-ripple{position:absolute;pointer-events:none;overflow:hidden;}
.jci-ripple svg{opacity:0.12;}

/* Sidebar JCI branding */
.sb-logo-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.sb-logo-sub{font-size:10px;color:var(--text2);margin-top:2px;letter-spacing:0.3px;text-transform:uppercase;}

/* Login page JCI style */
.login-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px;}
.login-org{font-size:12px;color:var(--jci-blue);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}

/* Metric cards slight border accent */
.metric{border-top:2px solid var(--jci-blue);}
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* JCI Brand Colours — Voorstel 3: Navy & Goud */
  --navy:#0B0920;--navy2:#110E2A;--navy3:#1A1640;--navy4:#231E55;
  --teal:#0097D7;--teal2:#33B3E8;--teal-dim:#003D5C;
  --red:#E17055;--red-dim:#4A1F10;
  --text:#FFFFFF;--text2:#D4E4F0;--text3:#8AB4CC;
  --border:#1A1640;--border2:#231E55;
  --card:#110E2A;--card2:#16132F;
  --green:#57BCBC;--green-bg:#0D3535;
  --amber:#EFC40F;--amber-bg:#2E2600;
  --blue:#0097D7;--blue-bg:#003D5C;
  --purple:#1F4789;--purple-bg:#0D1E3A;
  --coral:#EFC40F;--coral-bg:#2E2600;
  --jci-blue:#0097D7;--jci-dark:#1054A0;--jci-navy:#0B0920;--jci-teal:#57BCBC;--jci-yellow:#EFC40F;
  --gold:#EFC40F;--gold-dim:rgba(239,196,15,0.12);--gold-border:rgba(239,196,15,0.3);
  --font:'Plus Jakarta Sans','DM Sans',system-ui,-apple-system,sans-serif;--mono:'DM Mono','Courier New',monospace;
}
html,body{height:100%;font-family:var(--font);background:var(--navy);color:var(--text);font-size:13px;line-height:1.5;}
input,select,textarea,button{font-family:var(--font);font-size:13px;}
a{color:var(--teal);text-decoration:none;}a:hover{text-decoration:underline;}
.app{display:flex;height:100vh;overflow:hidden;}
.sb{width:210px;background:linear-gradient(180deg,#0F0C28 0%,#0B0920 100%);border-right:1px solid rgba(239,196,15,0.15);display:flex;flex-direction:column;flex-shrink:0;}
.sb-logo{padding:16px 16px 14px;border-bottom:1px solid rgba(239,196,15,0.15);background:rgba(16,84,160,0.15);}
.sb-logo-badge{display:inline-block;background:var(--jci-blue);color:#fff;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;letter-spacing:1px;margin-bottom:6px;}
.sb-logo-title{font-size:14px;font-weight:600;}
.sb-logo-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.sb-nav{padding:10px 0;flex:1;overflow-y:auto;}
.sb-section{font-size:9px;font-weight:600;color:rgba(239,196,15,0.6);letter-spacing:1.8px;padding:12px 16px 4px;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:12px;cursor:pointer;color:rgba(255,255,255,0.55);border-left:2px solid transparent;transition:all 0.15s;}
.sb-item:hover{background:rgba(239,196,15,0.06);color:rgba(255,255,255,0.85);}
.sb-item.active{background:rgba(239,196,15,0.1);color:#EFC40F;border-left:2px solid #EFC40F;font-weight:600;}
.sb-item i{font-size:15px;width:17px;}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:9px;}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--teal-dim);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--jci-blue);flex-shrink:0;}
.sb-user-name{font-size:11px;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-user-role{font-size:10px;color:#8AB4CC;}
.sb-logout{font-size:10px;color:#8AB4CC;cursor:pointer;margin-top:2px;display:block;}
.sb-logout:hover{color:var(--text2);}
.main{flex:1;overflow:auto;background:var(--navy);background-image:radial-gradient(ellipse at 80% 0%,rgba(16,84,160,0.12) 0%,transparent 60%);}
.page{padding:20px;display:none;}
.page.active{display:block;}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;}
.page-sub{font-size:11px;color:#8AB4CC;margin-top:2px;}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px;}
.metric{background:var(--card);border:1px solid rgba(239,196,15,0.15);border-radius:10px;padding:14px;border-top:2px solid rgba(239,196,15,0.4);}
.metric-label{font-size:9px;color:rgba(239,196,15,0.6);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;}
.metric-val{font-size:24px;font-weight:700;color:#EFC40F;}
.metric-val small{font-size:12px;font-weight:400;color:var(--text3);}
.prog{height:3px;background:var(--border2);border-radius:2px;margin-top:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:var(--jci-blue);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px;}
.card-title{font-size:9px;font-weight:600;color:rgba(239,196,15,0.7);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.av-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.av-item:last-child{border-bottom:none;}
.av-name{font-weight:500;font-size:12px;}
.av-meta{font-size:10px;color:#8AB4CC;margin-top:2px;}
.attend-btn{font-size:10px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);}
.attend-btn:hover{border-color:var(--teal);color:var(--teal);}
.attend-btn.yes{background:var(--green-bg);color:var(--green);border-color:var(--teal-dim);}
.attend-btn.no{background:var(--red-dim);color:var(--red);border-color:transparent;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;}
.b-green{background:var(--green-bg);color:var(--green);}
.b-amber{background:var(--amber-bg);color:var(--amber);}
.b-blue{background:var(--blue-bg);color:var(--blue);}
.b-gray{background:var(--navy3);color:var(--text2);}
.b-red{background:var(--red-dim);color:var(--red);}
.b-teal{background:var(--teal-dim);color:var(--teal2);}
.b-purple{background:var(--purple-bg);color:var(--purple);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-title{font-size:13px;font-weight:600;}
.cal-nav-btn{background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;cursor:pointer;color:var(--text2);}
.cal-nav-btn:hover{background:var(--navy3);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;}
.cal-hdr{font-size:9px;color:var(--text3);padding:3px;font-weight:600;letter-spacing:0.5px;}
.cal-day{font-size:11px;padding:6px 2px;border-radius:6px;color:#8AB4CC;cursor:default;position:relative;}
.cal-day.today{background:var(--navy3);color:var(--text);font-weight:600;}
.cal-day.has-bez{background:#EFC40F;color:#412402;font-weight:600;}
.cal-day.has-bez.has-av{background:#EFC40F;color:#412402;}
.cal-day.has-bez .cal-dot{opacity:1;}
.cal-day.has-av{background:rgba(0,151,215,0.2);color:var(--jci-blue);cursor:pointer;font-weight:600;}
.cal-day.has-av:hover{background:rgba(0,151,215,0.3);}
.cal-dots{display:flex;justify-content:center;gap:2px;margin-top:2px;}
.cal-dot{width:3px;height:3px;border-radius:50%;background:var(--jci-blue);opacity:0.7;}
.cal-dot.dot-visit{background:#EFC40F;opacity:1;}
.cal-popup{position:absolute;z-index:100;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px;min-width:200px;left:50%;transform:translateX(-50%);top:34px;text-align:left;}
.cal-popup-item{padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;}
.cal-popup-item:last-child{border-bottom:none;}
.tbl-wrap{overflow-x:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:11px;}
table.dt th{text-align:left;padding:6px 8px;color:rgba(239,196,15,0.65);font-weight:600;border-bottom:1px solid rgba(239,196,15,0.15);font-size:9px;text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;}
table.dt td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text2);}
table.dt tr:last-child td{border-bottom:none;}
table.dt tr:hover td{background:var(--navy3);}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:#C8DFF0;cursor:pointer;font-size:12px;font-weight:500;}
.btn:hover{background:var(--navy3);}
.btn-primary{background:linear-gradient(135deg,#1054A0 0%,#0D3E7A 100%);color:#fff;border-color:rgba(239,196,15,0.3);}
.btn-primary:hover{background:linear-gradient(135deg,#1565C0 0%,#0F4D94 100%);border-color:rgba(239,196,15,0.5);}
.btn-sm{padding:3px 9px;font-size:10px;}
.btn-danger{background:var(--red-dim);color:var(--red);border-color:transparent;}
.form-row{margin-bottom:11px;}
.form-label{font-size:10px;color:#8AB4CC;margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
.form-input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:7px;background:var(--navy3);color:#FFFFFF;}
.form-input:focus{outline:none;border-color:var(--teal);}
select.form-input option{background:var(--navy2);}
textarea.form-input{resize:vertical;min-height:70px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal{background:var(--card2);border-radius:12px;padding:22px;width:460px;max-width:96vw;border:1px solid var(--border2);max-height:92vh;overflow-y:auto;}
.modal-wide{width:680px;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.tab{padding:5px 12px;border-radius:7px;font-size:11px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:transparent;}
.tab.active{background:rgba(239,196,15,0.1);color:#EFC40F;border-color:rgba(239,196,15,0.3);font-weight:600;}
.status-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;color:#C8DFF0;}
.status-row:last-child{border-bottom:none;}
.district-lbl{font-size:9px;color:#8AB4CC;padding:8px 0 3px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.alert{padding:9px 12px;border-radius:7px;font-size:11px;margin-bottom:12px;}
.alert-red{background:var(--red-dim);color:var(--red);}
.alert-green{background:var(--green-bg);color:var(--green);}
.alert-blue{background:var(--blue-bg);color:var(--blue);}
.alert-amber{background:var(--amber-bg);color:var(--amber);}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);}
.login-card{background:var(--card);border:1px solid rgba(239,196,15,0.2);border-top:2px solid rgba(239,196,15,0.5);border-radius:14px;padding:32px;width:360px;}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.login-icon{width:40px;height:40px;border-radius:10px;background:var(--teal-dim);border:1px solid var(--jci-blue);display:flex;align-items:center;justify-content:center;}
.login-title{font-size:18px;font-weight:600;}
.login-sub{font-size:12px;color:#8AB4CC;}
.vz-wrap{min-height:100vh;background:var(--navy);padding:20px;}
.vz-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:20px;max-width:580px;margin:0 auto;}
.search-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;}
.checkbox-row:last-child{border-bottom:none;}
.email-preview{background:var(--navy);border:1px solid var(--border2);border-radius:7px;padding:12px;font-size:11px;font-family:var(--mono);line-height:1.7;white-space:pre-wrap;color:var(--text2);}
.bulk-ta{width:100%;min-height:90px;padding:8px;border:1px solid var(--border2);border-radius:7px;background:var(--navy);color:var(--text);font-family:var(--mono);font-size:11px;resize:vertical;}
#map-container,#map-afd-container{width:100%;border-radius:10px;overflow:hidden;border:1px solid var(--border2);background:var(--navy3);}
#map-container{height:360px;}
#map-afd-container{height:480px;}
.map-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--text2);}
.map-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;}
.note-item{padding:10px 0;border-bottom:1px solid var(--border);}
.note-item:last-child{border-bottom:none;}
.note-text{font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap;}
.note-meta{font-size:10px;color:var(--text3);margin-top:4px;display:flex;align-items:center;justify-content:space-between;}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ts-small{font-size:10px;color:#8AB4CC;font-family:var(--mono);}
.seg-btn{padding:5px 12px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-size:11px;}
.seg-btn.active{background:rgba(239,196,15,0.15);color:#EFC40F;border-color:rgba(239,196,15,0.4);font-weight:600;}
.chart-wrap{position:relative;background:var(--navy3);border-radius:8px;padding:12px;margin-bottom:12px;}
@media(max-width:700px){
  /* ── App shell ── */
  .app{flex-direction:column;}

  /* ── Sidebar → top nav bar ── */
  .sb{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .sb-logo{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;}
  .sb-logo-title{font-size:14px;}
  .sb-logo-sub{margin-top:2px;font-size:9px;}
  .sb-nav{display:flex;flex-direction:row;padding:4px 8px;overflow-x:auto;gap:0;scrollbar-width:none;-ms-overflow-style:none;}
  .sb-nav::-webkit-scrollbar{display:none;}
  .sb-section{display:none;}
  .sb-item{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;padding:8px 11px;font-size:11px;gap:5px;}
  .sb-item.active{border-bottom:2px solid #EFC40F;border-left:none;background:rgba(239,196,15,0.06);}
  .sb-footer{display:none;}

  /* ── Main content ── */
  .main{overflow:auto;}
  .page{padding:12px;}
  .page-title{font-size:15px;}
  .page-sub{font-size:10px;}

  /* ── Topbar ── */
  .topbar{margin-bottom:12px;gap:6px;}
  .topbar > div:first-child{flex:1;}

  /* ── Metrics dashboard ── */
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;}
  .metric-val{font-size:20px;}

  /* ── Grids ── */
  .grid2,.form-grid2{grid-template-columns:1fr;}

  /* ── Tables: horizontal scroll ── */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.dt{font-size:10px;}
  table.dt th,table.dt td{padding:5px 6px;}

  /* ── Cards ── */
  .card{padding:10px 12px;}

  /* ── Buttons in topbar ── */
  .btn-sm{font-size:9px;padding:3px 7px;}

  /* ── Login ── */
  .login-wrap{padding:16px;align-items:flex-start;padding-top:40px;}
  .login-card{width:100%;max-width:420px;padding:22px 18px;border-radius:12px;}

  /* ── Modal ── */
  .modal{padding:16px;border-radius:10px;}
  .modal-wide{width:96vw;}

  /* ── Tabs / seg-btns ── */
  .tabs{overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}

  /* ── Calendar ── */
  .cal-day{font-size:9px;min-height:36px;}
  .cal-hdr{font-size:9px;}

  /* ── AV items ── */
  .av-item{flex-wrap:wrap;gap:4px;}

  /* ── Search row ── */
  .search-row{flex-wrap:wrap;}
  .search-row .form-input{width:100%!important;flex:1;}
}

/* Extra small (≤400px) */
@media(max-width:400px){
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr));}
  .sb-item{padding:8px 9px;font-size:10px;}
  .page{padding:8px;}
}

@media(max-width:700px){
  /* Allow tables to use full width */
  .card .tbl-wrap{margin-left:-12px;margin-right:-12px;padding-left:12px;}
  /* Sort buttons scroll horizontally */
  .sort-scroll{overflow-x:auto;flex-wrap:nowrap!important;scrollbar-width:none;}
  .sort-scroll::-webkit-scrollbar{display:none;}
}
/* Leaflet dark overrides */
.leaflet-container{background:#162236!important;}
.leaflet-tile{filter:brightness(0.7) saturate(0.6);}
.leaflet-popup-content-wrapper{background:var(--card2);color:var(--text);border:1px solid var(--border2);border-radius:8px;font-family:var(--font);font-size:12px;}
.leaflet-popup-tip{background:var(--card2);}
.leaflet-popup-close-button{color:var(--text2)!important;}
.drag-hint{background:var(--amber-bg);color:var(--amber);padding:8px 12px;border-radius:7px;font-size:11px;margin-bottom:10px;display:none;}
.sb-item span{display:inline-flex;align-items:center;flex-shrink:0;}

.cal-day.has-visit{border-bottom:2px solid #EFC40F;}

/* Voorstel 3: Gold accent utilities */
.gold-border-l{border-left:3px solid rgba(239,196,15,0.5);}
.gold-text{color:#EFC40F;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#1054A0,#EFC40F);}
table.dt tr:hover td{background:rgba(239,196,15,0.04);}
.district-lbl{color:rgba(239,196,15,0.5);}
.form-input:focus{outline:none;border-color:rgba(239,196,15,0.4);}
.b-gr{background:var(--green-bg);color:var(--green);}
.b-rd{background:var(--red-dim);color:var(--red);}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(239,196,15,0.12);}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:rgba(16,84,160,0.4);border:1px solid rgba(239,196,15,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#EFC40F;flex-shrink:0;}
.cal-day.has-av{background:rgba(16,84,160,0.3);color:#33B3E8;cursor:pointer;font-weight:600;}
.cal-day.today{background:rgba(239,196,15,0.15);color:#EFC40F;font-weight:700;border:1px solid rgba(239,196,15,0.3);}
.metric-val small{font-size:12px;font-weight:400;color:rgba(239,196,15,0.5);}
</style>
</head>
<body>
<div id="root"></div>
<script>// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const DIST={
  "Antwerpen":["JCI Antwerpen","JCI Lier","JCI Mechelen"],
  "Oost-Vlaanderen":["JCI Aalst","JCI Deinze-Latem","JCI Gent","JCI Gent-Artevelde","JCI Oudenaarde","JCI Ronse","JCI Waasland"],
  "West-Vlaanderen":["JCI Brugge","JCI Damme-Zwinstreek","JCI Harelbeke","JCI Houtland","JCI Kortrijk","JCI Menen-Wevelgem","JCI Oostende-Middenkust","JCI Roeselare-Izegem","JCI Tielt","JCI Veurne-Westkust","JCI Waregem"],
  "Vlaams-Brabant & Brussel":["JCI Brussel","JCI Leuven","JCI The Heart Of Europe"],
  "Limburg":["JCI Genk","JCI Haspengouw","JCI Hasselt"]
};

// Local-only persist (cache)
function sdbLocal(){try{localStorage.setItem(SK,JSON.stringify(DB));}catch(e){}}
// Tracks whether the user has made a local change this session.
// A late server response must never clobber a fresh local edit.
var DB_DIRTY=false;
// Persist: update localStorage cache + fire-and-forget POST to server (Netlify Blobs)
function sdb(){
  DB_DIRTY=true;
  sdbLocal();
  syncToServer();
}
// Fire-and-forget save to server
function syncToServer(){
  try{
    fetch('/api/saveData',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB)}).catch(function(){});
  }catch(e){}
}
// Pull latest data from server on startup; merge defaults and re-render.
// Defensive: only overwrites the local cache when the server returns a real DB,
// AND the user hasn't started editing (no local change, no open modal/edit).
// This prevents a slow server response (Netlify cold start) from wiping an
// in-progress edit or a freshly saved change.
function syncFromServer(){
  try{
    fetch('/api/getData').then(function(r){return r&&r.ok?r.json():null;}).then(function(d){
      var looksReal=d&&typeof d==='object'&&(d.vz||d.afdInfo||d.avs||d.jciAvs||(d.admins&&d.admins.length));
      if(looksReal){
        // Don't clobber an active session: skip if the user already changed
        // something or has a modal/edit open. Their data is authoritative and
        // has already been POSTed; the next reload will pick up server state.
        if(DB_DIRTY||(typeof S!=='undefined'&&(S.modal||S.jciAvEdit)))return;
        DB=d;applyDbDefaults();sdbLocal();
        try{render();}catch(e){}
      }else{
        // Server empty/unavailable → seed it from local cache
        syncToServer();
      }
    }).catch(function(){});
  }catch(e){}
}

function render(){
  const r=document.getElementById("root");
  // Save scroll position of the actual scroll container (.main) before re-render
  const mainEl=r.querySelector('.main');
  const scrollY=mainEl?mainEl.scrollTop:0;
  const winY=window.scrollY;
  if(S.view==="login")r.innerHTML=rLogin();
  else if(S.view==="setup")r.innerHTML=rSetup();
  else r.innerHTML=rAdmin();
  // Restore scroll position on the new .main element
  const newMain=r.querySelector('.main');
  if(newMain&&scrollY>0)newMain.scrollTop=scrollY;
  if(winY>0)window.scrollTo(0,winY);

  if(S.view==="afd-map"){setTimeout(initAfdMap,120);}
  if(S.view==="vz-map"){setTimeout(initAfdMapReadonly,120);}
  if(S.view==="vz-leden"||S.view==="leden"){setTimeout(initCharts,120);}
  if(S.view==="afd-detail"){setTimeout(initAfdDetailChart,200);}
}
function checkUrlToken(){

function isDevSite(){
  try{

function recordLogin(e){
  if(!e)return;
  if(!DB.lastLogin)DB.lastLogin={};
  const now=new Date();
  DB.lastLogin[e]=now.toLocaleDateString("nl-BE")+" "+now.toLocaleTimeString("nl-BE",{hour:"2-digit",minute:"2-digit"});
  sdb();
}
function login(){
  const e=document.getElementById("le")?.value.trim().toLowerCase();
  const p=document.getElementById("lp")?.value;
  S.loginEmail=e;S.loginErr="";S.loginMsg="";
  if((e==="admin@jci.be"&&p==="admin123")||(DB.admins.includes(e)&&DB.pw[e]===p)){S.user=e;S.role="admin";S.view="db";recordLogin(e);render();return;}
  if(DB.bestuur&&DB.bestuur.includes(e)&&DB.pw[e]===p){S.user=e;S.role="bestuur";S.view="db";recordLogin(e);render();return;}
  // Check localBestuur
  const lb=Object.entries(DB.localBestuur||{}).find(([,members])=>Array.isArray(members)&&members.find(m=>m.email&&m.email.toLowerCase()===e)&&DB.pw[e]===p);
  if(lb){if(DB.pending[e]){S.setupToken=e;S.view="setup";render();return;}S.user=e;S.role="localBestuur";S.afd=lb[0];S.view="vz";recordLogin(e);render();return;}

}

}

function saveVZProfiel(){
  const afd=S.afd;if(!DB.vz[afd])DB.vz[afd]={};
  const oldNaam=DB.vz[afd].naam||'';const oldGsm=DB.vz[afd].gsm||'';
  DB.vz[afd].naam=document.getElementById("vz-naam")?.value||"";
  DB.vz[afd].gsm=document.getElementById("vz-gsm")?.value||"";
  DB.vz[afd].werkjaar=document.getElementById("vz-wj")?.value||"kalender";
  if(DB.vz[afd].naam!==oldNaam)logChange("Naam gewijzigd",afd,"naam",oldNaam,DB.vz[afd].naam,nowStr());
  if(DB.vz[afd].gsm!==oldGsm)logChange("GSM gewijzigd",afd,"gsm",oldGsm,DB.vz[afd].gsm,nowStr());
  sdb();alert("Profiel opgeslagen!");
}
function saveVZLeden(){
  const afd=S.afd;if(!canEditAfd(afd))return;
  if(!DB.afdInfo[afd])DB.afdInfo[afd]={ledenHistory:[],kandidatenHistory:[]};
  const newLeden=document.getElementById("vz-leden")?.value;
  const newKand=document.getElementById("vz-kand")?.value;
  const peildatum=document.getElementById("vz-peildatum")?.value||nowStr();
  const ts=tsNow();const by=S.user;
  if(newLeden!==String(DB.afdInfo[afd].leden||"")){
    const old=DB.afdInfo[afd].leden||"";
    DB.afdInfo[afd].leden=newLeden;DB.afdInfo[afd].ledenDatum=peildatum;
    DB.afdInfo[afd].ledenHistory.push({val:newLeden,datum:peildatum,ts,by});
    logChange("Leden gewijzigd",afd,"leden",old,newLeden,peildatum);
  }
  if(newKand!==String(DB.afdInfo[afd].kandidaten||"")){
    const old=DB.afdInfo[afd].kandidaten||"";
    DB.afdInfo[afd].kandidaten=newKand;DB.afdInfo[afd].kandidatenDatum=peildatum;
    DB.afdInfo[afd].kandidatenHistory.push({val:newKand,datum:peildatum,ts,by});
    logChange("Kandidaten gewijzigd",afd,"kandidaten",old,newKand,peildatum);
  }
  sdb();render();alert("Ledengegevens opgeslagen!");
}

function exportICS(){
  const avs=DB.avs.filter(a=>a.datum);
  if(avs.length===0){alert("Geen AV's om te exporteren.");return;}
  function icsDate(datum,uur){
    const[y,m,d]=datum.split('-');
    if(uur){const[h,mn]=uur.split(':');return y+m+d+'T'+(h||'19').padStart(2,'0')+(mn||'00').padStart(2,'0')+'00';}
    return y+m+d;
  }
  function icsEsc(s){return(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');}
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//JCI Vlaanderen LA-platform//NL",
    "X-WR-CALNAME:JCI Vlaanderen AV's","X-WR-TIMEZONE:Europe/Brussels"];
  avs.forEach(av=>{
    const dtstart=icsDate(av.datum,av.uur);
    let dtend=dtstart;
    if(av.uur){const[y,m,d]=av.datum.split('-');const[h,mn]=av.uur.split(':');
      const endH=String(Math.min(parseInt(h)+2,23)).padStart(2,'0');
      dtend=y+m+d+'T'+endH+(mn||'00').padStart(2,'0')+'00';}
    lines.push("BEGIN:VEVENT",
      "UID:jci-av-"+av.id+"@jcivlaanderen.be",
      "DTSTAMP:"+new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+"Z",
      (av.uur?"DTSTART;TZID=Europe/Brussels:":"DTSTART;VALUE=DATE:")+dtstart,
      (av.uur?"DTEND;TZID=Europe/Brussels:":"DTEND;VALUE=DATE:")+dtend,
      "SUMMARY:"+icsEsc("AV "+av.afdeling),
      ...([av.locatie,av.adres].filter(Boolean).length?["LOCATION:"+icsEsc([av.locatie,av.adres].filter(Boolean).join(', '))]:[]),
      "DESCRIPTION:"+icsEsc("Algemene Vergadering "+av.afdeling),
      "END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  const blob=new Blob([lines.join("\r\n")],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="jci-vlaanderen-avs.ics";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function rBezoek(){
  // Veiligheidscontrole: zonder leesrecht op 'bezoek' geen toegang tot dit scherm.
  if(!hasRecht('bezoek','ro'))return`<div class="page active"><div class="topbar"><div><div class="page-title">${t('bezoekplan')}</div></div></div><div class="card"><div style="color:var(--text2);font-size:12px;padding:10px 0;">${t('geen_toegang_bezoek')}</div></div></div>`;
  const filterStatus=S.visitFilter||'alle';
  const all=(DB.visits||[]).slice();
  const counts={gepland:0,bezocht:0,afgelast:0};
  all.forEach(v=>{if(counts[v.status]!==undefined)counts[v.status]++;});
  const filtered=filterStatus==='alle'?all:all.filter(v=>v.status===filterStatus);
  // Groepeer per AV-gelegenheid (afdeling + datum). Enkel gelegenheden met ≥1 aanwezige.
  const occMap={};
  filtered.forEach(v=>{const k=v.afdeling+'|'+v.datum;(occMap[k]=occMap[k]||[]).push(v);});
  const statusOrder={gepland:0,bezocht:1,afgelast:2};
  let occ=Object.keys(occMap).map(k=>{
    const i=k.indexOf('|');const afdeling=k.slice(0,i);const datum=k.slice(i+1);
    const av=(DB.avs||[]).find(a=>a.afdeling===afdeling&&a.datum===datum);
    const vs=occMap[k].slice().sort((a,b)=>(statusOrder[a.status]??9)-(statusOrder[b.status]??9)||userDisplayName(a.by).localeCompare(userDisplayName(b.by)));
    return {afdeling,datum,uur:av&&av.uur||'',locatie:av&&av.locatie||'',visits:vs};
  }).sort((a,b)=>a.datum.localeCompare(b.datum)||a.afdeling.localeCompare(b.afdeling));
  // Per maand groeperen voor de koppen
  const byMonth={};
  occ.forEach(o=>{const[y,m]=o.datum.split('-');const key=y+'-'+m;(byMonth[key]=byMonth[key]||[]).push(o);});
  const statusColor={gepland:'b-blue',bezocht:'b-green',afgelast:'b-red'};
  const statusLabel={gepland:t('gepland'),bezocht:t('bezocht'),afgelast:t('afgelast')};
  const canPlan=hasRecht('avEigen','rw')||hasRecht('avAnder','rw');
  return`<div class="page active">
    <div class="topbar">
      <div><div class="page-title">${t('bezoekplan')}</div>
        <div class="page-sub">${all.length} ${all.length===1?t('bezoek'):t('bezoeken')} · ${counts.bezocht} ${t('bezocht').toLowerCase()} · ${occ.length} ${t('avs_met_aanwezigen')}</div>
      </div>
      ${canPlan?`<button class="btn btn-primary btn-sm" onclick="S.visitEditId=null;S.visitModal={};render()">${ICO.plus} ${t('bezoek_toevoegen')}</button>`:''}
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">
      ${['alle','gepland','bezocht','afgelast'].map(s=>`<button class="seg-btn ${filterStatus===s?'active':''}" onclick="S.visitFilter='${s}';render()">${s==='alle'?t('alle'):statusLabel[s]||s}${s!=='alle'?` (${counts[s]||0})`:''}</button>`).join('')}
    </div>
    ${occ.length===0?`<div class="card"><div style="color:var(--text2);font-size:12px;padding:10px 0;">${t('geen_data')}</div></div>`:''}

function saveVisit(){
  const v={id:Date.now().toString(),
    afdeling:document.getElementById('vi-afd')?.value||'',
    datum:document.getElementById('vi-datum')?.value||nowStr(),
    uur:document.getElementById('vi-uur')?.value||'',
    locatie:document.getElementById('vi-loc')?.value||'',
    status:document.getElementById('vi-status')?.value||'gepland',
    notitie:document.getElementById('vi-notitie')?.value||'',
    by:S.user,ts:tsNow()};
  if(!v.datum){alert(t('datum')+' is verplicht.');return;}
  if(!canAttend(v.afdeling)){alert('Je hebt geen schrijfrecht om een bezoek te plannen voor deze afdeling.');return;}
  if(!DB.visits)DB.visits=[];
  DB.visits.push(v);logChange('Bezoek gepland',v.afdeling,'bezoek','',v.datum,v.datum);
  sdb();S.visitModal=null;S.visitEditId=null;render();
}
function updVisit(id){
  const v=DB.visits.find(x=>x.id===id);if(!v)return;
  if(!canEditVisit(v))return; // veiligheidscontrole
  v.afdeling=document.getElementById('vi-afd')?.value||v.afdeling;
  v.datum=document.getElementById('vi-datum')?.value||v.datum;
  v.uur=document.getElementById('vi-uur')?.value||'';
  v.locatie=document.getElementById('vi-loc')?.value||'';
  const oldStatus=v.status;
  v.status=document.getElementById('vi-status')?.value||v.status;
  v.notitie=document.getElementById('vi-notitie')?.value||'';
  v.ts=tsNow();
  // 'by' (eigenaar) blijft ongewijzigd, ook als een admin/bestuur het bezoek bewerkt.
  if(oldStatus!==v.status)logChange('Bezoek status gewijzigd',v.afdeling,'bezoek',oldStatus,v.status,v.datum);
  sdb();S.visitModal=null;S.visitEditId=null;render();
}
function delVisit(id){
  const v=DB.visits.find(x=>x.id===id);
  if(v&&!canEditVisit(v))return; // veiligheidscontrole
  if(!confirm('Bezoek verwijderen?'))return;
  if(v)logChange('Bezoek verwijderd',v.afdeling,'bezoek',v.datum,'',v.datum);
  DB.visits=DB.visits.filter(x=>x.id!==id);sdb();render();
}

function exportExcel(){
  if(!(hasRecht('ledenAnder','ro')||hasRecht('ledenEigen','ro')))return;
  const exportAfds=hasRecht('ledenAnder','ro')?ALL:(S.afd?[S.afd]:[]);
  // Use SheetJS if available, else fall back to CSV
  const rows=[['Afdeling','District','Voorzitter','GSM','Werkjaar','Leden','Kandidaten','Peildatum leden',
    'Aug 2023','Aug 2024','Aug 2025','Mei 2026','Bezoek gepland','Bezoek status']];
  exportAfds.forEach(afd=>{
    const info=DB.afdInfo[afd]||{};const vz=DB.vz[afd]||{};
    const hist=info.ledenHistory||[];
    const getVal=(date)=>{const e=hist.find(h=>h.datum===date);return e?parseInt(e.val)||0:'';};
    const visit=(DB.visits||[]).filter(v=>v.afdeling===afd).sort((a,b)=>b.datum.localeCompare(a.datum))[0];
    rows.push([
      afd,gt(afd),vz.naam||'',vz.gsm||'',werkjaarLabel(vz.werkjaar||'kalender'),
      info.leden?parseInt(info.leden):0,info.kandidaten?parseInt(info.kandidaten):0,info.ledenDatum||'',
      getVal('2023-08-01'),getVal('2024-08-01'),getVal('2025-08-01'),getVal('2026-05-01'),
      visit?visit.datum:'',visit?visit.status:''
    ]);
  });
  if(typeof XLSX!=="undefined"){
    const ws=XLSX.utils.aoa_to_sheet(rows);
    // Style header row
    const range=XLSX.utils.decode_range(ws['!ref']);
    for(let c=range.s.c;c<=range.e.c;c++){
      const addr=XLSX.utils.encode_cell({r:0,c});
      if(ws[addr])ws[addr].s={font:{bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"0097D7"}}};
    }
    // Set column widths
    ws['!cols']=[{wch:24},{wch:18},{wch:22},{wch:16},{wch:14},{wch:8},{wch:10},{wch:14},{wch:8},{wch:8},{wch:8},{wch:8},{wch:12},{wch:10}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Leden JCI Vlaanderen");
    // Add historiek sheet
    const histRows=[['Afdeling','Datum','Leden','Door']];
    ALL.forEach(afd=>{
      const hist=(DB.afdInfo[afd]?.ledenHistory||[]).sort((a,b)=>a.datum.localeCompare(b.datum));
      hist.forEach(h=>histRows.push([afd,h.datum,parseInt(h.val)||0,h.by||'']));
    });
    const ws2=XLSX.utils.aoa_to_sheet(histRows);
    ws2['!cols']=[{wch:24},{wch:12},{wch:8},{wch:28}];
    XLSX.utils.book_append_sheet(wb,ws2,"Historiek");
    const date=new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb,`jci-vlaanderen-leden-${date}.xlsx`);
  } else {
    // Fallback to CSV
    const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const bom='\uFEFF';
    const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='jci-vlaanderen-leden.csv';
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
  }
}

function initAfdDetailChart(){
  const afd=S.afdDetail;if(!afd)return;
  if(S.view!=="afd-detail")return;
  const canvas=document.getElementById("afd-detail-chart");if(!canvas)return;
  if(typeof Chart==="undefined"){setTimeout(initAfdDetailChart,500);return;}
  const info=DB.afdInfo[afd]||{};
  const chartType=S.afdChartType||'leden';
  const lHist=[...info.ledenHistory||[]].sort((a,b)=>a.datum.localeCompare(b.datum));
  const kHist=[...info.kandidatenHistory||[]].sort((a,b)=>a.datum.localeCompare(b.datum));
  if(lHist.length===0&&kHist.length===0)return;
  const dateSet=new Set();
  lHist.forEach(h=>{if(h.datum)dateSet.add(h.datum);});
  kHist.forEach(h=>{if(h.datum)dateSet.add(h.datum);});
  const dates=[...dateSet].sort();
  if(dates.length===0)return;
  const msVals=dates.map(d=>new Date(d).getTime());
  const msMin=msVals[0],msMax=msVals[msVals.length-1]||msVals[0]+1;
  const xPos=msVals.map(ms=>msMax===msMin?50:((ms-msMin)/(msMax-msMin))*100);
  const labels=dates.map(d=>{const[y,m,dd]=d.split("-");return`${parseInt(dd)}/${parseInt(m)}/${y}`;});
  function latestOnDate(hist,targetDate){
    const f=hist.filter(h=>h.datum<=targetDate).sort((a,b)=>a.datum.localeCompare(b.datum));
    return f.length?parseInt(f.slice(-1)[0].val)||0:0;
  }
  const lData=dates.map(d=>latestOnDate(lHist,d));
  const kData=dates.map(d=>latestOnDate(kHist,d));
  const datasets=[];
  if(chartType!=='kandidaten')datasets.push({label:t('leden_lbl'),data:xPos.map((x,i)=>({x,y:lData[i]})),showLine:true,borderColor:"#0097D7",backgroundColor:"rgba(0,151,215,0.15)",fill:true,tension:0,pointRadius:3,pointBackgroundColor:"#0097D7"});
  if(chartType!=='leden')datasets.push({label:t('kandidaten'),data:xPos.map((x,i)=>({x,y:kData[i]})),showLine:true,borderColor:"#EFC40F",backgroundColor:"rgba(239,196,15,0.1)",fill:false,tension:0,pointRadius:3,pointBackgroundColor:"#EFC40F"});
  const existing=Chart.getChart(canvas);if(existing)existing.destroy();
  new Chart(canvas,{type:"scatter",data:{datasets},options:{responsive:true,
    plugins:{legend:{display:chartType==='beide',labels:{color:"#8AB4CC",font:{size:9}}}},
    scales:{
      x:{type:"linear",min:0,max:100,ticks:{color:"#8AB4CC",font:{size:8},callback:function(val){const idx=xPos.findIndex(x=>Math.abs(x-val)<3);return idx>-1?labels[idx]:'';}},grid:{color:"rgba(45,39,102,0.3)"}},
      y:{ticks:{color:"#8AB4CC",font:{size:8}},beginAtZero:true,grid:{color:"rgba(45,39,102,0.3)"}},
      y2:{position:"right",ticks:{color:"#8AB4CC",font:{size:8}},beginAtZero:true,grid:{drawOnChartArea:false},
        afterBuildTicks:function(axis){axis.ticks=(axis.chart.scales.y?axis.chart.scales.y.ticks:[]).map(function(t){return Object.assign({},t);});}}
    }}});
}

function addLocalBestuur(afd){
  const naam=document.getElementById('lb-naam')?.value.trim();
  const functie=document.getElementById('lb-functie')?.value.trim();
  const email=document.getElementById('lb-email')?.value.trim().toLowerCase();
  const gsm=document.getElementById('lb-gsm')?.value.trim();
  const wj=document.getElementById('lb-wj')?.value.trim()||werkjaarLabel((DB.werkjaarConfig&&DB.werkjaarConfig[afd]?.type)||DB.vz[afd]?.werkjaar||'kalender');
  const rol=document.getElementById('lb-rol')?.value||'localBestuur';
  if(!email){alert('E-mailadres is verplicht.');return;}
  if(!DB.localBestuur[afd])DB.localBestuur[afd]=[];
  // Also save in afdLeden per werkjaar for G3 display
  if(!DB.afdLeden)DB.afdLeden={};
  if(!DB.afdLeden[afd])DB.afdLeden[afd]={};
  if(!DB.afdLeden[afd][wj])DB.afdLeden[afd][wj]=[];
  if(!DB.afdLeden[afd][wj].find(l=>l.email===email)){
    DB.afdLeden[afd][wj].push({naam,functie,email,gsm,rol,werkjaar:wj,ts:tsNow()});
  }
  const tok=genTok();
  const pw='jci'+Math.random().toString(36).slice(2,5)+Math.floor(100+Math.random()*900);
  DB.localBestuur[afd].push({naam,functie,email,gsm,werkjaar:wj,rol,ts:tsNow()});
  DB.pw[email]=pw;
  DB.pending[email]={token:tok,ts:Date.now()};
  sdb();
  const link=location.origin+location.pathname+'?token='+tok;
  showEmailSim(email,'Toegang JCI Vlaanderen LA-platform — '+afd,`Beste ${naam},\n\nJe werd toegevoegd als lokaal bestuurslid van ${afd}.\n\nJe tijdelijk wachtwoord: ${pw}\nOf stel in via: ${link}\n\nMet vriendelijke groeten,\n${DB.vz[afd]?.naam||'Afdelingsvoorzitter'}`);
  S.modal='local-bestuur';render();
}

function rmLocalBestuur(afd,idx){
  if(!confirm('Bestuurslid verwijderen?'))return;
  const m=DB.localBestuur[afd][idx];
  if(m?.email){delete DB.pw[m.email];delete DB.pending[m.email];}
  DB.localBestuur[afd].splice(idx,1);
  sdb();render();
}

function resendLocalBestuur(email,afd){
  const tok=genTok();
  DB.pending[email]={token:tok,ts:Date.now()};
  sdb();
  const link=location.origin+location.pathname+'?token='+tok;
  const m=(DB.localBestuur[afd]||[]).find(x=>x.email===email)||{};
  showEmailSim(email,'Nieuwe toegangslink — JCI LA-platform',`Beste ${m.naam||''},\n\nNieuwe toegangslink:\n${link}\n\nMet vriendelijke groeten,\n${DB.vz[afd]?.naam||'Afdelingsvoorzitter'}`);
}

function rAvLijst(){
  const isAdmBest=isAdminOrBestuur();
  const sortMode=S.avSortMode||'chronologisch';
  const filterAfd=S.avFilterAfd||'alle';
  const filterPeriod=S.avFilterPeriod||'komende';
  const filterWj=S.avFilterWj||'alle';
  const filterVan=S.avFilterVan||'';
  const filterTot=S.avFilterTot||'';
  const filterBezocht=S.avFilterBezocht||'alle';
  const today=nowStr();

  // Rechten-scoping: avAnder ro = alle afdelingen; enkel avEigen ro = eigen afdeling.
  const seeAllAv=hasRecht('avAnder','ro');
  const seeOwnAv=hasRecht('avEigen','ro');
  const baseAvs=seeAllAv?DB.avs:(seeOwnAv?DB.avs.filter(a=>a.afdeling===S.afd):[]);
  // Beschikbare werkjaren (kalenderjaren) afgeleid uit de zichtbare AV-data
  const avYears=[...new Set(baseAvs.map(a=>a.datum.slice(0,4)))].sort().reverse();
  // Eigen bezoeken (persoonlijke planning)
  const mv=myVisits();

  // Filter avs (start vanuit de toegelaten set)
  let avs=[...baseAvs];
  if(filterPeriod==='komende') avs=avs.filter(a=>a.datum>=today);
  else if(filterPeriod==='voorbije') avs=avs.filter(a=>a.datum<today);
  if(filterAfd!=='alle') avs=avs.filter(a=>a.afdeling===filterAfd);
  if(filterWj!=='alle') avs=avs.filter(a=>a.datum.slice(0,4)===filterWj);
  if(filterVan) avs=avs.filter(a=>a.datum>=filterVan);
  if(filterTot) avs=avs.filter(a=>a.datum<=filterTot);
  // Bezocht-filter o.b.v. het HUIDIGE WERKJAAR per afdeling (gepland + bezocht tellen mee, afgelast niet).
  if(filterBezocht==='nietbezocht') avs=avs.filter(a=>!bezochtInHuidigWerkjaar(a.afdeling,mv));
  else if(filterBezocht==='bezocht') avs=avs.filter(a=>bezochtInHuidigWerkjaar(a.afdeling,mv));
  // VZ only sees own + all (read-only for others)
  // Sort (oud -> nieuw)
  if(sortMode==='chronologisch') avs.sort((a,b)=>a.datum.localeCompare(b.datum));
  else avs.sort((a,b)=>a.afdeling.localeCompare(b.afdeling)||a.datum.localeCompare(b.datum));

  // Group
  let groups=[];
  if(sortMode==='chronologisch'){
    const byMonth={};
    avs.forEach(av=>{
      const[y,m]=av.datum.split('-');
      const key=`${y}-${m}`;
      if(!byMonth[key])byMonth[key]=[];
      byMonth[key].push(av);
    });
    groups=Object.entries(byMonth).map(([k,avs])=>{
      const[y,m]=k.split('-');
      return{label:`${MON[parseInt(m)-1]} ${y}`,avs};
    });
  } else {
    const byAfd={};
    avs.forEach(av=>{
      if(!byAfd[av.afdeling])byAfd[av.afdeling]=[];
      byAfd[av.afdeling].push(av);
    });
    groups=Object.entries(byAfd).map(([afd,avs])=>({label:afd,avs}));
  }

  const canEdit=(afd)=>canAttend(afd);

  return`<div class="page active">
    <div class="topbar">
      <div>
        <div class="page-title">${t('avLijst')}</div>
        <div class="page-sub">${baseAvs.length} ${t('avLijst').toLowerCase()} · ${baseAvs.filter(a=>a.datum>=today).length} ${t('gepland').toLowerCase()}</div>
      </div>
      <div style="display:flex;gap:5px;">
        <button class="btn btn-sm" onclick="exportICS()">${ICO.export} ICS</button>
        ${(hasRecht('avAnder','rw')||hasRecht('avEigen','rw'))?`<button class="btn btn-primary btn-sm" onclick="S.editId=null;S.modal='av';S.avModalDatum='';render()">${ICO.calav} ${t('av_toevoegen')}</button>`:''}
      </div>
    </div>
    <div style="display:flex;gap:0;border-bottom:0.5px solid rgba(255,255,255,0.08);margin-bottom:10px;overflow-x:auto;scrollbar-width:none;">
      <button onclick="S.avListTab='lijst';render()" style="padding:7px 18px;font-size:11px;font-weight:${(S.avListTab||'lijst')==='lijst'?'600':'400'};background:transparent;border:none;border-bottom:2px solid ${(S.avListTab||'lijst')==='lijst'?'#0097D7':'transparent'};color:${(S.avListTab||'lijst')==='lijst'?'#0097D7':'rgba(255,255,255,0.4)'};cursor:pointer;">${t('lijst')}</button>
      <button onclick="switchView('kal')" style="padding:7px 18px;font-size:11px;font-weight:${S.avListTab==='kalender'?'600':'400'};background:transparent;border:none;border-bottom:2px solid ${S.avListTab==='kalender'?'#0097D7':'transparent'};color:${S.avListTab==='kalender'?'#0097D7':'rgba(255,255,255,0.4)'};cursor:pointer;">${t('avKal')}</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
      <div style="display:flex;border:0.5px solid rgba(255,255,255,0.12);border-radius:6px;overflow:hidden;">
        <button class="seg-btn ${sortMode==='chronologisch'?'active':''}" style="border-radius:0;border:none;" onclick="S.avSortMode='chronologisch';render()">${t('chronologisch')}</button>
        <button class="seg-btn ${sortMode==='afdeling'?'active':''}" style="border-radius:0;border:none;border-left:0.5px solid rgba(255,255,255,0.08);" onclick="S.avSortMode='afdeling';render()">${t('afdeling')}</button>
      </div>
      <div style="display:flex;border:0.5px solid rgba(255,255,255,0.12);border-radius:6px;overflow:hidden;">
        <button class="seg-btn ${filterPeriod==='komende'?'active':''}" style="border-radius:0;border:none;" onclick="S.avFilterPeriod='komende';render()">${t('komende')}</button>
        <button class="seg-btn ${filterPeriod==='voorbije'?'active':''}" style="border-radius:0;border:none;border-left:0.5px solid rgba(255,255,255,0.08);" onclick="S.avFilterPeriod='voorbije';render()">${t('afgelopen')}</button>
        <button class="seg-btn ${filterPeriod==='alle'?'active':''}" style="border-radius:0;border:none;border-left:0.5px solid rgba(255,255,255,0.08);" onclick="S.avFilterPeriod='alle';render()">${t('alle')}</button>
      </div>
      <select class="form-input" style="width:130px;font-size:10px;" onchange="S.avFilterWj=this.value;render()">
        <option value="alle" ${filterWj==='alle'?'selected':''}>${t('alle_werkjaren')}</option>
        ${avYears.map(y=>`<option value="${y}" ${filterWj===y?'selected':''}>${y}</option>`).join('')}
      </select>
      ${hasRecht('avAnder','ro')?`<select class="form-input" style="width:160px;font-size:10px;" onchange="S.avFilterAfd=this.value;render()">
        <option value="alle">${t('alle')} afdelingen</option>
        ${ALL.map(a=>`<option value="${a}" ${filterAfd===a?'selected':''}>${a.replace('JCI ','')}</option>`).join('')}
      </select>`:''}
    </div>
    ${(hasRecht('avEigen','rw')||hasRecht('avAnder','rw'))?`<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;font-size:10px;">
      <span style="color:#8AB4CC;">${t('periode')}:</span>
      <input class="form-input" type="date" style="width:140px;font-size:10px;color-scheme:dark;" value="${filterVan}" onchange="S.avFilterVan=this.value;render()"/>
      <span style="color:#8AB4CC;">${t('tot')}</span>
      <input class="form-input" type="date" style="width:140px;font-size:10px;color-scheme:dark;" value="${filterTot}" onchange="S.avFilterTot=this.value;render()"/>
      <span style="color:#8AB4CC;margin-left:6px;">${t('bezoek_werkjaar')}:</span>
      <div style="display:flex;border:0.5px solid rgba(255,255,255,0.12);border-radius:6px;overflow:hidden;">
        <button class="seg-btn ${filterBezocht==='alle'?'active':''}" style="border-radius:0;border:none;" onclick="S.avFilterBezocht='alle';render()">${t('alle')}</button>
        <button class="seg-btn ${filterBezocht==='nietbezocht'?'active':''}" style="border-radius:0;border:none;border-left:0.5px solid rgba(255,255,255,0.08);" onclick="S.avFilterBezocht='nietbezocht';render()" title="Afdelingen die je dit werkjaar nog niet bezocht hebt">${t('nog_niet_bezocht')}</button>
        <button class="seg-btn ${filterBezocht==='bezocht'?'active':''}" style="border-radius:0;border:none;border-left:0.5px solid rgba(255,255,255,0.08);" onclick="S.avFilterBezocht='bezocht';render()" title="Afdelingen die je dit werkjaar al bezocht hebt">${t('al_bezocht')}</button>
      </div>
      ${(filterVan||filterTot||filterBezocht!=='alle')?`<button class="btn btn-sm" style="font-size:9px;" onclick="S.avFilterVan='';S.avFilterTot='';S.avFilterBezocht='alle';render()">${ICO.xmark||'×'} ${t('wis')}</button>`:''}
    </div>`:''}

    ${groups.length===0?`<div class="card"><div style="color:var(--text2);font-size:12px;padding:10px 0;">${t('geen_avs')}</div></div>`:''}

    ${groups.map(g=>`<div style="margin-bottom:12px;">
      <div style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;padding-left:2px;">${g.label}</div>
      ${g.avs.map(av=>{
        const isPast=av.datum<today;
        const notes=DB.avNotes&&DB.avNotes[av.id];
        return`<div class="av-item" style="${isPast?'opacity:.6;':''};border-left:2px solid #57BCBC;">
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;">
              <div style="font-weight:600;font-size:12px;"><a href="#" onclick="event.preventDefault();openAfdDetail('${av.afdeling}')" style="color:#0097D7;text-decoration:none;">${av.afdeling}</a></div>
              <span class="badge b-teal" style="font-size:8px;">${t('avLokaal')}</span>
              ${isPast?`<span class="badge b-gray" style="font-size:8px;">Afgelopen</span>`:`<span class="badge b-blue" style="font-size:8px;">${t('gepland')}</span>`}
            </div>
            <div style="font-size:10px;color:#8AB4CC;margin-top:2px;">${fd(av.datum)}${av.uur?' · '+av.uur:''} ${av.locatie?'· '+av.locatie:''}</div>
            ${notes&&(notes.acties||notes.verslag)?`<div style="font-size:9px;color:rgba(239,196,15,0.55);margin-top:2px;">📋 ${(notes.acties||'').slice(0,60)}${notes.acties&&notes.acties.length>60?'...':''}</div>`:''}
          </div>
          <div style="display:flex;gap:4px;align-items:center;">
            ${canAttend(av.afdeling)?`
              <button class="attend-btn btn-sm ${av.aanwezig===true?'yes':av.aanwezig===false?'no':''}" onclick="togAan('${av.id}')">${av.aanwezig===true?ICO.check:av.aanwezig===false?ICO.xmark:'?'}</button>
              <button class="btn btn-sm" onclick="S.editId='${av.id}';S.modal='av';S.avModalDatum='';render()">${ICO.edit}</button>
              <button class="btn btn-sm btn-danger" onclick="delAV('${av.id}')">${ICO.trash}</button>
            `:`<div title="Enkel lezen" style="color:rgba(255,255,255,0.2);font-size:10px;">🔒</div>`}
          </div>
        </div>`;
      }).join('')}
    </div>`).join('')}

  </div>`;}

function toggleAfdAktief(afd){
  if(!canEditAfdInfo(afd))return;
  const currentlyAktief=DB.afdInfo[afd]?.aktief!==false;
  if(currentlyAktief){
    // Show confirmation modal before deactivating
    S.modal='inaktief-confirm';
    S.inaktiefAfd=afd;
    render();
  } else {
    // Reactivate without confirmation
    if(!DB.afdInfo[afd])DB.afdInfo[afd]={ledenHistory:[],kandidatenHistory:[]};
    DB.afdInfo[afd].aktief=true;
    DB.afdInfo[afd].inaktiefReden='';
    // Remove from inaktief array if present
    if(DB.inaktief)DB.inaktief=DB.inaktief.filter(a=>a!==afd);
    logChange('Afdeling geactiveerd',afd,'aktief','false','true',nowStr());
    sdb();render();
  }
}

function confirmInaktief(afd){
  if(!canEditAfdInfo(afd))return;
  const reden=document.getElementById('inaktief-reden')?.value||'';
  if(!DB.afdInfo[afd])DB.afdInfo[afd]={ledenHistory:[],kandidatenHistory:[]};
  DB.afdInfo[afd].aktief=false;
  DB.afdInfo[afd].inaktiefReden=reden;
  if(!DB.inaktief)DB.inaktief=[];
  if(!DB.inaktief.includes(afd))DB.inaktief.push(afd);
  logChange('Afdeling inactief gezet',afd,'aktief','true','false',nowStr());
  sdb();S.modal=null;S.inaktiefAfd=null;render();
}

}

function rJciAvs(){
  // Toegangsguard: leesrecht op eigen/andere aanwezigheid of beheerrecht.
  if(!(hasRecht('jciAvEigen','ro')||hasRecht('jciAvAnder','ro')||hasRecht('jciAvBeheer','ro')))return`<div class="page active"><div class="topbar"><div class="page-title" style="color:#0097D7;">${t('avJci')}</div></div><div class="card"><div style="color:var(--text2);font-size:12px;padding:10px 0;">${t('geen_toegang_scherm')}</div></div></div>`;
  const isAdmBest=isAdminOrBestuur();
  const today=nowStr();
  const avs=(DB.jciAvs||[]).sort((a,b)=>a.datum.localeCompare(b.datum));
  const upcoming=avs.filter(a=>a.datum>=today);
  const past=avs.filter(a=>a.datum<today).reverse();
  const S_jciTab=S.jciAvTab||'upcoming';

  // For VZ: check which AVs have open registration
  function isRegOpen(av){
    if(isAdmBest)return true;
    if(!av.inschrijvingOpen)return false;
    const openDatum=av.inschrijvingOpenDatum||dateAddDays(av.datum,-14);
    const sluitDatum=av.sluitingsDatum||dateAddDays(av.datum,-2);
    return today>=openDatum&&today<=sluitDatum;
  }

  function vzStatus(av){
    const st=(DB.jciAvStatus||{})[av.id]?.[S.afd];
    return st||{status:'onbekend'};
  }

  const displayAvs=S_jciTab==='past'?past:S_jciTab==='all'?avs.slice():upcoming;

  return`<div class="page active">
    <div class="topbar">
      <div>
        <div class="page-title" style="color:#0097D7;">${t('avJci')}</div>
        <div class="page-sub">${avs.length} vergaderingen · ${upcoming.length} komende</div>
      </div>
      <div style="display:flex;gap:5px;">
        ${hasRecht('jciAvBeheer','rw')?`
          <button class="btn btn-sm" onclick="S.modal='stemsterkte';render()">${ICO.settings} Stemsterktes</button>
          <button class="btn btn-primary btn-sm" onclick="S.jciAvEdit=null;S.modal='jci-av-form';render()">${ICO.calav} Nieuwe AV</button>
        `:''}
      </div>
    </div>

    <div style="display:flex;gap:5px;margin-bottom:12px;">
      <button class="seg-btn ${S_jciTab!=='past'&&S_jciTab!=='all'?'active':''}" onclick="S.jciAvTab='upcoming';render()">Komende (${upcoming.length})</button>
      <button class="seg-btn ${S_jciTab==='past'?'active':''}" onclick="S.jciAvTab='past';render()">Voorbije (${past.length})</button>
      <button class="seg-btn ${S_jciTab==='all'?'active':''}" onclick="S.jciAvTab='all';render()">Alle (${avs.length})</button>
    </div>

    ${displayAvs.length===0?`<div class="card"><div style="color:var(--text2);font-size:12px;padding:10px 0;">${t('geen_avs')}</div></div>`:''}

    ${displayAvs.map(av=>{
      const st=vzStatus(av);
      const regOpen=isRegOpen(av);
      const isPast=av.datum<today;
      const status=DB.jciAvStatus?.[av.id]||{};
      const totStemmen=Object.entries(DB.stemsterkte||{}).filter(([a])=>DB.afdInfo[a]?.aktief!==false).reduce((s,[,v])=>s+v,0);
      const aanwStemmen=Object.entries(status).reduce((s,[afd,st2])=>{
        if(st2.status==='aanwezig'&&DB.afdInfo[afd]?.aktief!==false){
          const eigen=(DB.stemsterkte||{})[afd]||1;
          const vm=st2.volmachtAan?0:eigen;
          const recv=Object.values(status).filter(x=>x.volmachtAan===afd&&x.status==='verontschuldigd').reduce((ss,x)=>{
            const giver=Object.keys(status).find(k=>status[k]===x);
            return ss+(giver?(DB.stemsterkte||{})[giver]||1:0);
          },0);
          return s+vm+recv;
        }
        return s;
      },0);

      return`<div class="card" style="margin-bottom:8px;border-left:2px solid #0097D7;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:10px;">
          <div style="display:flex;align-items:flex-start;gap:10px;">
            ${(hasRecht('jciAvAnder','ro')||hasRecht('jciAvBeheer','rw'))?`<button class="btn btn-sm ${S.jciAvDetail===av.id?'btn-primary':''}" style="margin-top:1px;white-space:nowrap;" onclick="S.jciAvDetail=(S.jciAvDetail==='${av.id}'?null:'${av.id}');render()" title="Deelnemerslijst tonen/verbergen">${S.jciAvDetail===av.id?'▾':'▸'} Deelnemers</button>`:''}
            <div>
              <div style="font-size:13px;font-weight:600;color:#fff;">${t('avJci')} — ${fd(av.datum)} ${av.uur?'· '+av.uur:''}</div>
              <div style="font-size:11px;color:#8AB4CC;margin-top:2px;">${av.locatie||'Locatie TBD'}${av.adres?' · '+av.adres:''}</div>
              ${av.agenda?`<div style="font-size:10px;color:#6A94B0;margin-top:2px;">📋 ${av.agenda.slice(0,80)}${av.agenda.length>80?'...':''}</div>`:''}
              ${av.externeLink?`<div style="margin-top:4px;"><a href="${av.externeLink.replace(/"/g,'&quot;')}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#EFC40F;text-decoration:none;font-weight:600;">${ICO.ext} Externe inschrijflink</a></div>`:''}
            </div>
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
            ${isPast?`<span class="badge b-gray">Afgelopen</span>`:`<span class="badge b-blue">${t('gepland')}</span>`}
            ${hasRecht('jciAvBeheer','rw')?`
              <span class="badge b-green" title="Aanwezige stemmen">${aanwStemmen}/${totStemmen} stemmen</span>
              <button class="btn btn-sm" onclick="S.jciAvEdit='${av.id}';S.modal='jci-av-form';render()">${ICO.edit}</button>
              <button class="btn btn-sm btn-danger" onclick="delJciAV('${av.id}')">${ICO.trash}</button>

          </div>
        </div>

        ${!isPast&&hasRecht('jciAvEigen','rw')&&S.afd&&regOpen?`
          <div style="border-top:0.5px solid rgba(255,255,255,0.07);padding-top:8px;">
            <div style="font-size:10px;color:#8AB4CC;margin-bottom:5px;">Jouw aanwezigheid (${S.afd?.replace('JCI ','')||''}) · Stemsterkte: <span style="color:#EFC40F;font-weight:600;">${(DB.stemsterkte||{})[S.afd]||1}</span></div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;">
              <button class="btn btn-sm ${st.status==='aanwezig'?'btn-primary':''}" onclick="setJciStatus('${av.id}','aanwezig')">${ICO.check} ${t('aanwezig')}</button>
              <button class="btn btn-sm ${st.status==='verontschuldigd'?'':''}` + `" style="${st.status==='verontschuldigd'?'border-color:#EFC40F;color:#EFC40F;':''}" onclick="setJciStatus('${av.id}','verontschuldigd')">Verontschuldigd</button>
              ${st.status==='verontschuldigd'?`<button class="btn btn-sm" style="border-color:#57BCBC;color:#57BCBC;" onclick="S.jciVolmachtAv='${av.id}';S.modal='jci-volmacht';render()">+ Volmacht geven</button>`:''}
            </div>
            ${st.status==='verontschuldigd'&&st.volmachtAan?`<div style="font-size:9px;color:#EFC40F;margin-top:4px;">Volmacht gegeven aan ${st.volmachtAan}</div>`:''}
            ${st.status==='aanwezig'?`<div style="font-size:9px;color:#1D9E75;margin-top:4px;">✓ Aanwezigheid bevestigd</div>`:''}
          </div>
        `:''}
        ${!isPast&&hasRecht('jciAvEigen','rw')&&S.afd&&!regOpen&&!isAdmBest?`<div style="font-size:9px;color:rgba(255,255,255,0.25);border-top:0.5px solid rgba(255,255,255,0.06);padding-top:6px;margin-top:2px;">Inschrijvingen ${av.inschrijvingOpen?'gesloten':'nog niet geopend'}</div>`:''}

        ${S.jciAvDetail===av.id&&(hasRecht('jciAvAnder','ro')||hasRecht('jciAvBeheer','rw'))?rJciAvOverzicht(av):''}
      </div>`;
    }).join('')}
  </div>`;}

function rJciAvOverzicht(av){
  const status=DB.jciAvStatus?.[av.id]||{};
  const today=nowStr();
  const rows=ALL.filter(a=>DB.afdInfo[a]?.aktief!==false).map(afd=>{
    const st=status[afd]||{status:'onbekend'};
    const stem=(DB.stemsterkte||{})[afd]||1;
    const receivedVm=Object.entries(status).filter(([giver,gs])=>gs.volmachtAan===afd&&gs.status==='verontschuldigd').map(([giver])=>giver);
    const effStem=st.status==='aanwezig'?stem+receivedVm.reduce((s,g)=>s+((DB.stemsterkte||{})[g]||1),0):0;
    const vz=DB.vz[afd]||{};
    return{afd,st,stem,receivedVm,effStem,vz};
  });
  const totEff=rows.reduce((s,r)=>s+r.effStem,0);
  const totMax=rows.reduce((s,r)=>s+r.stem,0);

  return`<div style="border-top:0.5px solid rgba(255,255,255,0.1);margin-top:8px;padding-top:8px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div style="font-size:11px;font-weight:600;color:#0097D7;">Aanwezigheidsoverzicht</div>
      <div style="display:flex;gap:5px;">
        <span class="badge b-green">${rows.filter(r=>r.st.status==='aanwezig').length} aanwezig</span>
        <span class="badge b-amber">${rows.filter(r=>r.st.status==='verontschuldigd').length} veronts.</span>
        <span class="badge b-gray">${rows.filter(r=>r.st.status==='onbekend').length} onbekend</span>
        ${hasRecht('jciAvBeheer','rw')?`<button class="btn btn-sm" style="background:rgba(87,188,188,0.15);color:#57BCBC;border-color:rgba(87,188,188,0.3);" onclick="exportJciAvXlsx('${av.id}')">${ICO.export} Excel</button>`:''}
      </div>
    </div>
    <div style="overflow-x:auto;">
    <table class="dt" style="font-size:9px;">
      <thead><tr>
        <th>Afdeling</th><th>${t('voorzitter')}</th>
        <th>Stemsterkte</th><th>Status</th><th>Volmacht</th><th>Eff. stemmen</th>
      </tr></thead>
      <tbody>
      ${rows.map(({afd,st,stem,receivedVm,effStem,vz})=>`<tr style="${st.status==='aanwezig'?'background:rgba(29,158,117,0.05)':st.status==='verontschuldigd'?'background:rgba(239,196,15,0.04)':''}">
        <td style="font-weight:600;color:#c8dff0;">${afd.replace('JCI ','')}</td>
        <td style="color:#8AB4CC;">${vz.naam||'—'}</td>
        <td><div style="display:flex;gap:1px;">${Array(stem).fill('<div style="width:8px;height:8px;border-radius:2px;background:#0097D7;"></div>').join('')}</div> ${stem}</td>
        <td>
          ${hasRecht('jciAvBeheer','rw')?`<div style="display:flex;gap:3px;">
            <button class="btn btn-sm ${st.status==='aanwezig'?'btn-primary':''}" style="font-size:7px;padding:1px 5px;" onclick="setJciStatusAdmin('${av.id}','${afd}','aanwezig')">${ICO.check}</button>
            <button class="btn btn-sm" style="font-size:7px;padding:1px 5px;${st.status==='verontschuldigd'?'border-color:#EFC40F;color:#EFC40F;':''}" onclick="setJciStatusAdmin('${av.id}','${afd}','verontschuldigd')">V</button>
            <button class="btn btn-sm" style="font-size:7px;padding:1px 5px;${st.status==='afwezig'?'border-color:#E24B4A;color:#E24B4A;':''}" onclick="setJciStatusAdmin('${av.id}','${afd}','afwezig')">A</button>
          </div>`:`<span class="badge ${st.status==='aanwezig'?'b-green':st.status==='verontschuldigd'?'b-amber':st.status==='afwezig'?'b-rd':'b-gray'}" style="font-size:8px;">${st.status==='aanwezig'?'Aanwezig':st.status==='verontschuldigd'?'Veronts.':st.status==='afwezig'?'Afwezig':'Onbekend'}</span>`}
        </td>
        <td style="font-size:8px;">
          ${st.status==='verontschuldigd'?(hasRecht('jciAvBeheer','rw')?(()=>{
            // Build candidates: active afds that are aanwezig and haven't already received a volmacht from another afd
            const candidates=ALL.filter(cand=>{
              if(cand===afd||DB.afdInfo[cand]?.aktief===false)return false;
              const candSt=status[cand]||{};
              if(candSt.status!=='aanwezig')return false;
              // Check max 1 volmacht: cand can't already have received one
              const alreadyReceiving=Object.entries(status).some(([giver,gs])=>gs.volmachtAan===cand&&giver!==afd);
              return!alreadyReceiving;
            });
            const curVm=st.volmachtAan||'';
            return`<select style="background:#1a1640;border:0.5px solid rgba(239,196,15,0.35);border-radius:4px;padding:2px 5px;font-size:8px;color:${curVm?'#EFC40F':'#c8dff0'};max-width:130px;cursor:pointer;" onchange="setJciVolmachtAdmin('${av.id}','${afd}',this.value)">
              <option value="">— geen volmacht —</option>
              ${candidates.map(c=>`<option value="${c}" ${curVm===c?'selected':''}>${c.replace('JCI ','')}</option>`).join('')}
              ${curVm&&!candidates.find(c=>c===curVm)?`<option value="${curVm}" selected>${curVm.replace('JCI ','')} ⚠</option>`:''}
            </select>`;
          })():(st.volmachtAan?`<span style="color:#EFC40F;">→ ${st.volmachtAan.replace('JCI ','')}</span>`:`<span style="color:rgba(255,255,255,0.2);">—</span>`))
          :receivedVm.length
            ?`<span style="color:#57BCBC;">+&nbsp;${receivedVm.map(g=>g.replace('JCI ','')).join(', ')}</span>`
            :`<span style="color:rgba(255,255,255,0.2);">—</span>`}
        </td>
        <td><span class="badge ${effStem>0?'b-green':'b-gray'}">${effStem}</span></td>
      </tr>`).join('')}
      <tr style="border-top:0.5px solid rgba(0,151,215,0.3);">
        <td colspan="5" style="color:#0097D7;font-weight:600;">Totaal effectieve stemmen</td>
        <td><span class="badge b-blue">${totEff} / ${totMax}</span></td>
      </tr>
      </tbody>
    </table>
    </div>
  </div>`;}

function saveJciAV(){
  let datum=document.getElementById('jav-datum')?.value||S.jciAvDatum||'';
  // Also try reading raw value for cross-browser compat
  if(!datum){const el=document.getElementById('jav-datum');datum=el?el.value:'';}    
  if(datum.match(/^\d{2}\/\d{2}\/\d{4}$/)){const[d,m,y]=datum.split('/');datum=`${y}-${m}-${d}`;}
  if(!datum||!datum.match(/^\d{4}-\d{2}-\d{2}$/)){alert('Datum is verplicht.');return;}
  const uur=document.getElementById('jav-uur')?.value||'';
  const locatie=document.getElementById('jav-loc')?.value||'';
  const adres=document.getElementById('jav-adres')?.value||'';
  const agenda=document.getElementById('jav-agenda')?.value||'';
  const openDatum=document.getElementById('jav-open')?.value||dateAddDays(datum,-14);
  const sluitDatum=document.getElementById('jav-sluit')?.value||dateAddDays(datum,-2);
  const inschrijvingOpen=document.getElementById('jav-insch')?.checked||false;
  const externeLink=document.getElementById('jav-extlink')?.value.trim()||'';
  if(S.jciAvEdit){
    const idx=(DB.jciAvs||[]).findIndex(a=>String(a.id)===String(S.jciAvEdit));
    if(idx>-1)DB.jciAvs[idx]={...DB.jciAvs[idx],datum,uur,locatie,adres,agenda,externeLink,inschrijvingOpen,inschrijvingOpenDatum:openDatum,sluitingsDatum:sluitDatum};
  } else {
    if(!DB.jciAvs)DB.jciAvs=[];
    DB.jciAvs.push({id:Date.now().toString(),datum,uur,locatie,adres,agenda,externeLink,inschrijvingOpen,inschrijvingOpenDatum:openDatum,sluitingsDatum:sluitDatum});
  }
  sdb();S.modal=null;S.jciAvEdit=null;S.jciAvDatum='';render();
}

function delJciAV(id){
  if(!confirm('AV JCI Vlaanderen verwijderen?'))return;
  DB.jciAvs=(DB.jciAvs||[]).filter(a=>a.id!==id);
  if(DB.jciAvStatus)delete DB.jciAvStatus[id];
  sdb();render();
}

function setJciStatus(avId,status){
  if(!hasRecht('jciAvEigen','rw'))return;
  if(!DB.jciAvStatus)DB.jciAvStatus={};
  if(!DB.jciAvStatus[avId])DB.jciAvStatus[avId]={};
  const afd=S.afd;
  const prev=DB.jciAvStatus[avId][afd]||{};
  // Toggle: clicking same status again resets to onbekend
  if(prev.status===status){
    DB.jciAvStatus[avId][afd]={status:'onbekend',by:S.user,ts:tsNow()};
    sdb();render();return;
  }
  if(status!=='verontschuldigd'&&prev.volmachtAan){
    delete DB.jciAvStatus[avId][afd].volmachtAan;
  }
  DB.jciAvStatus[avId][afd]={...prev,status,by:S.user,ts:tsNow()};
  sdb();render();
}

function setJciStatusAdmin(avId,afd,status){
  if(!(hasRecht('jciAvBeheer','rw')||hasRecht('jciAvAnder','rw')))return;
  if(!DB.jciAvStatus)DB.jciAvStatus={};
  if(!DB.jciAvStatus[avId])DB.jciAvStatus[avId]={};
  const prev=DB.jciAvStatus[avId][afd]||{};
  // Toggle: clicking same status again resets to onbekend
  if(prev.status===status){
    DB.jciAvStatus[avId][afd]={status:'onbekend',by:S.user,ts:tsNow()};
    sdb();render();return;
  }
  if(status!=='verontschuldigd'&&prev.volmachtAan)delete prev.volmachtAan;
  DB.jciAvStatus[avId][afd]={...prev,status,by:S.user,ts:tsNow()};
  sdb();render();
}

function rJciVolmachtModal(){
  const avId=S.jciVolmachtAv;
  const av=(DB.jciAvs||[]).find(a=>a.id===avId);
  if(!av)return'';
  const status=DB.jciAvStatus?.[avId]||{};
  const myAfd=S.afd;
  // Candidates: other active afd VZs who are aanwezig + don't already have a volmacht
  const candidates=ALL.filter(a=>{
    if(a===myAfd||DB.afdInfo[a]?.aktief===false)return false;
    const st=status[a]||{};
    // Can receive if aanwezig and hasn't already received a volmacht
    const alreadyReceiving=Object.values(status).some(s=>s.volmachtAan===a);
    return st.status==='aanwezig'&&!alreadyReceiving;
  });

  const ownBestuur=(DB.localBestuur||{})[myAfd]||[];
  return`<div class="modal-bg" onclick="S.modal=null;render()"><div class="modal" onclick="event.stopPropagation()" style="max-width:420px;">

function getWerkjaren(afd){
  // Returns list of werkjaren for an afdeling, ordered newest first
  const cfg=(DB.werkjaarConfig||{})[afd]||{};
  // Type bepalen: werkjaarConfig heeft voorrang, anders het werkjaar van de voorzitter (zoals elders in de app)
  const type=cfg.type||(DB.vz[afd]&&DB.vz[afd].werkjaar)||'kalender';
  // Find earliest data point
  const info=DB.afdInfo[afd]||{};
  const vz=DB.vz[afd]||{};
  const allDates=[];
  (info.ledenHistory||[]).forEach(h=>{if(h.datum)allDates.push(h.datum);});
  (info.kandidatenHistory||[]).forEach(h=>{if(h.datum)allDates.push(h.datum);});
  ((DB.afdLeden||{})[afd]||{});
  // Start from first known data or oprichting
  const firstDate=info.oprichting||allDates.sort()[0]||'2020-01-01';
  const firstYear=parseInt(firstDate.slice(0,4));
  const currentYear=new Date().getFullYear();
  const currentMonth=new Date().getMonth()+1;
  const years=[];
  if(type==='kalender'){
    for(let y=currentYear;y>=firstYear;y--){
      years.push({label:String(y),type:'kalender',isCurrent:y===currentYear});
    }
  } else {
    // academie: aug-jul
    const currentWj=currentMonth>=8?`${currentYear}-${currentYear+1}`:`${currentYear-1}-${currentYear}`;
    const startAcad=currentMonth>=8?currentYear:currentYear-1;
    for(let y=startAcad;y>=firstYear;y--){
      years.push({label:`${y}-${y+1}`,type:'academie',isCurrent:`${y}-${y+1}`===currentWj});
    }
  }
  // P14: beperk tot werkjaren waarvoor er gebruikers bestaan (+ altijd het huidige werkjaar).
  const ledenByWj=(DB.afdLeden||{})[afd]||{};
  const lbList=(DB.localBestuur||{})[afd]||[];
  const wjMetGebruikers=new Set();
  Object.keys(ledenByWj).forEach(function(wj){if((ledenByWj[wj]||[]).length>0)wjMetGebruikers.add(wj);});
  lbList.forEach(function(m){if(m.werkjaar)wjMetGebruikers.add(m.werkjaar);});
  const filtered=years.filter(function(y){return y.isCurrent||wjMetGebruikers.has(y.label);});
  return filtered.length?filtered:years.filter(function(y){return y.isCurrent;});
}

function calcLustrum(afd){
  const info=DB.afdInfo[afd]||{};
  const oprichting=info.oprichting;
  if(!oprichting||!oprichting.match(/^\d{4}-\d{2}-\d{2}$/))return null;
  const opYear=parseInt(oprichting.slice(0,4));
  const opMonth=parseInt(oprichting.slice(5,7));
  const wjType=(DB.werkjaarConfig&&DB.werkjaarConfig[afd]?.type)||DB.vz[afd]?.werkjaar||'kalender';
  const now=new Date();
  const curYear=now.getFullYear();
  const curMonth=now.getMonth()+1;
  // Current werkjaar label
  const curWjStart=wjType==='academie'?(curMonth>=8?curYear:curYear-1):curYear;
  function lustrumWj(lustrumYear){
    if(wjType==='kalender')return String(lustrumYear);
    // academie: lustrumYear falls in which academie wj?
    // if opMonth>=8: lustrumYear is start of academie wj → lustrumYear-lustrumYear+1
    // if opMonth<8: lustrumYear is end → (lustrumYear-1)-lustrumYear
    return opMonth>=8?`${lustrumYear}-${lustrumYear+1}`:`${lustrumYear-1}-${lustrumYear}`;
  }
  function wjStart(wj){
    if(!wj.includes('-'))return parseInt(wj);
    return parseInt(wj.split('-')[0]);
  }
  // Find next lustrum >= current werkjaar
  const age=curYear-opYear;
  const nextN=Math.ceil(age/5)*5;
  const nextYear=opYear+nextN;
  const nextWj=lustrumWj(nextYear);
  const nextWjStart=wjStart(nextWj);
  const curWj=wjType==='academie'?(curMonth>=8?`${curYear}-${curYear+1}`:`${curYear-1}-${curYear}`):String(curYear);
  const nextWjStart2=wjStart(nextWj);
  const curWjStart2=curWjStart;
  // Check if next lustrum is this or next werkjaar
  const isCurrent=nextWjStart2===curWjStart2;
  const isNext=nextWjStart2===curWjStart2+1;
  return{nextN,nextWj,nextYear,isCurrent,isNext,opYear};
}

function doRolChange(email,newRol){
  if(!isAdmin()){return;}
  // Update role in all relevant DB locations
  const oldRol=S.rolPopupUser?.role;
  // Remove from bestuur if was bestuur
  if(oldRol==='bestuur'&&DB.bestuur){DB.bestuur=DB.bestuur.filter(e=>e!==email);}
  // Remove from admins if was admin (only superadmin can demote admins)
  // Add to bestuur if new role is bestuur
  if(newRol==='bestuur'){if(!DB.bestuur)DB.bestuur=[];if(!DB.bestuur.includes(email))DB.bestuur.push(email);}
  // Find and update the user's role in localBestuur records
  Object.entries(DB.localBestuur||{}).forEach(([afd,members])=>{
    members.forEach(m=>{if(m.email===email)m.rol=newRol;});

function bevestigOverdracht(afd){
  const nieuwEmail=document.getElementById('od-nieuw')?.value;
  const oudeRol=document.getElementById('od-ouderol')?.value||'localBestuur';
  if(!nieuwEmail){alert('Kies de nieuwe voorzitter.');return;}
  let nieuwNaam='',nieuwGsm='';
  if(nieuwEmail==='__nieuw'){
    const n=document.getElementById('od-naam')?.value.trim();
    const e=document.getElementById('od-email')?.value.trim().toLowerCase();
    const g=document.getElementById('od-gsm')?.value.trim();
    if(!e){alert('E-mail nieuwe voorzitter is verplicht.');return;}
    nieuwNaam=n;nieuwGsm=g;
    // Create user
    const pw='jci'+Math.random().toString(36).slice(2,5)+Math.floor(100+Math.random()*900);
    const tok=genTok();
    DB.pw[e]=pw;DB.pending[e]={token:tok,ts:Date.now()};
    if(!DB.localBestuur[afd])DB.localBestuur[afd]=[];
    DB.localBestuur[afd].push({naam:n,functie:'Voorzitter',email:e,gsm:g,rol:'vz',werkjaar:werkjaarLabel((DB.werkjaarConfig&&DB.werkjaarConfig[afd]?.type)||DB.vz[afd]?.werkjaar||'kalender'),ts:tsNow()});
    const link=location.origin+location.pathname+'?token='+tok;
    showEmailSim(e,'Nieuwe voorzitter JCI '+afd.replace('JCI ',''),`Beste ${n},\n\nJe bent aangeduid als nieuwe afdelingsvoorzitter van ${afd}.\n\nStel je wachtwoord in via:\n${link}\n\nMet vriendelijke groeten,\nJCI Vlaanderen`);
    // Update vz record
    if(!DB.vz[afd])DB.vz[afd]={};
    DB.vz[afd]={naam:n,email:e,gsm:g,werkjaar:DB.vz[afd]?.werkjaar||'kalender'};
  } else {
    // Existing user
    const m=(DB.localBestuur[afd]||[]).find(x=>x.email===nieuwEmail);
    nieuwNaam=m?.naam||nieuwEmail;
    nieuwGsm=m?.gsm||'';
    // Update vz record
    if(!DB.vz[afd])DB.vz[afd]={};
    DB.vz[afd]={naam:nieuwNaam,email:nieuwEmail,gsm:nieuwGsm,werkjaar:DB.vz[afd]?.werkjaar||'kalender'};
    // Update rol in localBestuur
    if(m)m.rol='vz';
  }
  // Downgrade old voorzitter
  const oldVzEmail=Object.entries(DB.vz).find(([a])=>a===afd)?.[1]?.email;
  if(oldVzEmail&&oldVzEmail!==nieuwEmail){
    const oldM=(DB.localBestuur[afd]||[]).find(x=>x.email===oldVzEmail);
    if(oldM)oldM.rol=oudeRol;
  }
  // Save overdracht record
  if(!DB.overdracht)DB.overdracht={};
  DB.overdracht[afd]={oudVz:oldVzEmail,nieuwVz:nieuwEmail,datum:nowStr(),oudeRol};
  logChange('Overdracht voorzitter',afd,'vz',oldVzEmail||'',nieuwEmail,nowStr());
  sdb();S.modal=null;S.overdrachtAfd=null;render();
}

function checkOverdrachtReminder(){
  if(S.role!=='vz'&&!isAdminOrBestuur())return'';
  const afd=S.afd;if(!afd)return'';
  const cfg=(DB.werkjaarConfig&&DB.werkjaarConfig[afd])||{};
  const type=cfg.type||DB.vz[afd]?.werkjaar||'kalender';
  const now=new Date();
  const m=now.getMonth()+1;const y=now.getFullYear();
  // Academie: ends Jul 31, kalender: ends Dec 31
  const endMonth=type==='academie'?7:12;
  const endYear=type==='academie'?(m>7?y+1:y):y;
  const endDate=new Date(endYear,endMonth-1,endMonth===7?31:31);
  const daysLeft=Math.round((endDate-now)/(1000*60*60*24));
  // Show reminder if within 31 days and no recent overdracht
  if(daysLeft<=31&&daysLeft>=0){
    const lastOD=(DB.overdracht||{})[afd];
    const recentOD=lastOD&&lastOD.datum&&((new Date()-new Date(lastOD.datum))/(1000*60*60*24))<90;
    if(!recentOD){
      return`<div class="alert" style="background:rgba(87,188,188,0.08);border:0.5px solid rgba(87,188,188,0.25);color:#57BCBC;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
        <div><strong>Overdracht nadert:</strong> Het werkingsjaar eindigt over ${daysLeft} ${daysLeft===1?'dag':'dagen'}. Tijd om de overdracht van het voorzitterschap in te plannen.</div>
        <button class="btn btn-sm" style="color:#57BCBC;border-color:rgba(87,188,188,0.3);white-space:nowrap;margin-left:8px;" onclick="S.overdrachtAfd='${afd}';S.modal='overdracht';render()">⇄ Overdracht starten</button>
      </div>`;
    }
  }
  return'';
}

function hasRecht(module,minLevel){

function sortAfds(arr){
  var sm=S.afdSortMode||"naam";
  var t2=nowStr();
  return arr.slice().sort(function(a,b){
    if(sm==="naam")return a.localeCompare(b);
    if(sm==="voorzitter")return((DB.vz[a]&&DB.vz[a].naam)||"").localeCompare((DB.vz[b]&&DB.vz[b].naam)||"");
    if(sm==="leden")return(parseInt((DB.afdInfo[b]&&DB.afdInfo[b].leden)||0)||0)-(parseInt((DB.afdInfo[a]&&DB.afdInfo[a].leden)||0)||0);
    if(sm==="kandidaten")return(parseInt((DB.afdInfo[b]&&DB.afdInfo[b].kandidaten)||0)||0)-(parseInt((DB.afdInfo[a]&&DB.afdInfo[a].kandidaten)||0)||0);
    if(sm==="lustrum"){var la=calcLustrum(a);var lb=calcLustrum(b);return((la&&la.nextYear)||9999)-((lb&&lb.nextYear)||9999);}
    if(sm==="av"){
      var na=DB.avs.filter(function(av){return av.afdeling===a&&av.datum>=t2;}).sort(function(x,y){return x.datum.localeCompare(y.datum);})[0];
      var nb=DB.avs.filter(function(av){return av.afdeling===b&&av.datum>=t2;}).sort(function(x,y){return x.datum.localeCompare(y.datum);})[0];
      return((na&&na.datum)||"9999").localeCompare((nb&&nb.datum)||"9999");
    }
    return 0;
  });
}

}

function delLeden(afd,field,idx){
  if(!isAdmin())return;
  var info=DB.afdInfo[afd];
  if(!info)return;
  var hist=field==='leden'?info.ledenHistory:info.kandidatenHistory;
  if(!hist||idx<0||idx>=hist.length)return;
  if(!confirm('Ledentelling verwijderen?'))return;
  var datum=hist[idx]&&hist[idx].datum;
  // Verwijder zowel de leden- als kandidaten-entry van dezelfde datum
  if(datum){
    if(info.ledenHistory)info.ledenHistory=info.ledenHistory.filter(function(h){return h.datum!==datum;});
    if(info.kandidatenHistory)info.kandidatenHistory=info.kandidatenHistory.filter(function(h){return h.datum!==datum;});
  } else {
    hist.splice(idx,1);
  }
  // Update huidige waarde naar laatst overgebleven telling
  if(info.ledenHistory&&info.ledenHistory.length>0){
    var lL=info.ledenHistory.slice().sort(function(a,b){return (b.datum||'').localeCompare(a.datum||'');})[0];
    info.leden=lL.val;info.ledenDatum=lL.datum;
  } else {info.leden='';}
  if(info.kandidatenHistory&&info.kandidatenHistory.length>0){
    var lK=info.kandidatenHistory.slice().sort(function(a,b){return (b.datum||'').localeCompare(a.datum||'');})[0];
    info.kandidaten=lK.val;
  } else {info.kandidaten='';}
  logChange('Ledentelling verwijderd',afd,field,'','',nowStr());
  sdb();render();
}
