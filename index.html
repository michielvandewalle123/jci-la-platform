function initCharts(){
  // Retry if Chart.js not yet loaded (async CDN)
  if(typeof Chart==="undefined"){
    const el=document.getElementById("leden-chart");
    if(el)el.parentElement.innerHTML='<div style="padding:20px;text-align:center;color:#8AB4CC;font-size:12px;">Grafieken laden...</div>';
    setTimeout(initCharts,400);return;
  }
  setTimeout(()=>{
    const canvas=document.getElementById("leden-chart");if(!canvas)return;
    if(chartInst){try{chartInst.destroy();}catch(e){}chartInst=null;}
    const ctx=canvas.getContext("2d");
    Chart.defaults.color="#8AB4CC";Chart.defaults.borderColor="#231E52";
    const BOTH=S.chartType==="beide";
    const ledenColor="#0097D7";const kandColor="#EFC40F";

    // ── TIJD VIEW ──────────────────────────────────────────────
    if(S.chartView==="tijd"){
      let afdsFilter=S.chartProv==="alle"?ALL:DIST[S.chartProv]||ALL;
      if(S.chartTijdAfd&&ALL.includes(S.chartTijdAfd))afdsFilter=[S.chartTijdAfd];

      const dateSet=new Set();
      afdsFilter.forEach(a=>{
        (DB.afdInfo[a]?.ledenHistory||[]).forEach(h=>{if(h.datum)dateSet.add(h.datum);});
      });
      const sortedDates=[...dateSet].sort();
      if(sortedDates.length===0){
        canvas.parentElement.innerHTML='<div style="padding:20px;text-align:center;color:#8AB4CC;font-size:12px;">Nog geen historische data beschikbaar.</div>';return;
      }

      function latestOnOrBefore(hist,targetDate){
        const filtered=(hist||[]).filter(h=>h.datum<=targetDate).sort((a,b)=>a.datum.localeCompare(b.datum));
        return filtered.length?parseInt(filtered.slice(-1)[0].val)||0:0;
      }
      const ledenData=sortedDates.map(d=>afdsFilter.reduce((s,a)=>s+latestOnOrBefore(DB.afdInfo[a]?.ledenHistory,d),0));
      const kandData=sortedDates.map(d=>afdsFilter.reduce((s,a)=>s+latestOnOrBefore(DB.afdInfo[a]?.kandidatenHistory,d),0));

      // Use real ms timestamps for proportional x-axis spacing
      const msVals=sortedDates.map(d=>new Date(d).getTime());
      const labels=sortedDates.map(d=>{const[y,m,dd]=d.split('-');return`${parseInt(dd)}/${parseInt(m)}/${y}`;});

      // Build scatter datasets (type:'scatter' with showLine:true)
      const ledenPts=msVals.map((x,i)=>({x,y:ledenData[i]}));
      const kandPts=msVals.map((x,i)=>({x,y:kandData[i]}));

      const datasets=[];
      if(S.chartType!=="kandidaten"){
        datasets.push({
          label:t('leden_lbl'),data:ledenPts,
          showLine:true,borderColor:ledenColor,backgroundColor:"rgba(0,151,215,0.15)",
          fill:BOTH?'origin':true,tension:0,pointRadius:5,pointBackgroundColor:ledenColor,
          pointHoverRadius:7,order:1
        });
      }
      if(S.chartType!=="leden"){
        datasets.push({
          label:t('kandidaten'),data:kandPts,
          showLine:true,borderColor:kandColor,backgroundColor:"rgba(239,196,15,0.12)",
          fill:false,tension:0,pointRadius:5,pointBackgroundColor:kandColor,
          pointHoverRadius:7,order:2
        });
      }
      if(BOTH&&datasets.length===2){
        // Add total line
        datasets.push({
          label:t('totaal'),
          data:msVals.map((x,i)=>({x,y:ledenData[i]+kandData[i]})),
          showLine:true,borderColor:"rgba(255,255,255,0.4)",borderDash:[5,4],
          fill:false,tension:0,pointRadius:0,order:0
        });
      }

      chartInst=new Chart(ctx,{
        type:"scatter",
        data:{datasets},
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{labels:{color:"#C8DFF0",font:{size:11}}},
            tooltip:{callbacks:{
              title:items=>{
                const ms=items[0].parsed.x;
                const idx=msVals.findIndex(v=>v===ms);
                return idx>-1?labels[idx]:new Date(ms).toLocaleDateString('nl-BE');
              },
              label:item=>`${item.dataset.label}: ${item.parsed.y}`
            }}
          },
          scales:{
            x:{
              type:"linear",
              ticks:{
                color:"#8AB4CC",font:{size:10},maxRotation:30,
                callback:val=>{
                  // Show label only for actual data points
                  const idx=msVals.findIndex(v=>Math.abs(v-val)<86400000*15);
                  return idx>-1?labels[idx]:'';
                }
              },
              grid:{color:"rgba(45,39,102,0.4)"}
            },
            y:{
              ticks:{color:"#8AB4CC",font:{size:10}},
              beginAtZero:true,
              title:{display:true,text:BOTH?"Leden + Kandidaten":t('leden_lbl'),color:"#8AB4CC",font:{size:10}},
              grid:{color:"rgba(45,39,102,0.4)"}
            }
          }
        }
      });
      return;
    }

    // ── BAR CHARTS (per afdeling / per provincie) ──────────────
    const labels=[],datasets=[];
    let afds=S.chartProv==="alle"?ALL:DIST[S.chartProv]||ALL;
    const barOpts=BOTH?{barPercentage:0.85,categoryPercentage:0.9}:{barPercentage:0.65,categoryPercentage:0.85};

    if(S.chartView==="prov"){
      const provLabels=Object.keys(DIST);
      const ledenData=provLabels.map(d=>DIST[d].reduce((s,a)=>s+parseInt(DB.afdInfo[a]?.leden||0),0));
      const kandData=provLabels.map(d=>DIST[d].reduce((s,a)=>s+parseInt(DB.afdInfo[a]?.kandidaten||0),0));
      const bgLeden=provLabels.map(d=>DIST_COLORS[d]+"DD");
      const bgKand=provLabels.map(d=>DIST_COLORS[d]+"66");
      if(S.chartType!=="kandidaten")datasets.push({label:t('leden_lbl'),data:ledenData,backgroundColor:bgLeden,borderRadius:4,...barOpts,stack:BOTH?'s':undefined});
      if(S.chartType!=="leden")datasets.push({label:t('kandidaten'),data:kandData,backgroundColor:bgKand,borderRadius:4,...barOpts,stack:BOTH?'s':undefined});
      chartInst=new Chart(ctx,{type:"bar",data:{labels:provLabels,datasets},options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:"#C8DFF0"}}},
        scales:{
          x:{ticks:{color:"#8AB4CC",font:{size:10}},stacked:BOTH},
          y:{ticks:{color:"#8AB4CC"},beginAtZero:true,stacked:BOTH,
            title:{display:true,text:t('leden_lbl'),color:"#8AB4CC",font:{size:9}}},
          y2:{position:"right",ticks:{color:"#8AB4CC",font:{size:9}},stacked:BOTH,
            grid:{drawOnChartArea:false},
            afterBuildTicks:function(axis){axis.ticks=axis.chart.scales.y.ticks.map(t=>({...t}));}}
        }
      }});
    } else {
      const afdLabels=afds.map(a=>a.replace('JCI ',''));
      const ledenData=afds.map(a=>parseInt(DB.afdInfo[a]?.leden||0));
      const kandData=afds.map(a=>parseInt(DB.afdInfo[a]?.kandidaten||0));
      const bgLeden=afds.map(a=>DIST_COLORS[gt(a)]+"DD");
      const bgKand=afds.map(a=>DIST_COLORS[gt(a)]+"55");
      if(S.chartType!=="kandidaten")datasets.push({label:t('leden_lbl'),data:ledenData,backgroundColor:bgLeden,borderRadius:4,...barOpts,stack:BOTH?'s':undefined});
      if(S.chartType!=="leden")datasets.push({label:t('kandidaten'),data:kandData,backgroundColor:bgKand,borderRadius:4,...barOpts,stack:BOTH?'s':undefined});
      const isHoriz=afds.length>10;
      chartInst=new Chart(ctx,{type:"bar",data:{labels:afdLabels,datasets},options:{
        responsive:true,maintainAspectRatio:false,
        indexAxis:isHoriz?"y":"x",
        plugins:{legend:{labels:{color:"#C8DFF0"}}},
        scales:{
          x:{ticks:{color:"#8AB4CC",font:{size:10}},stacked:BOTH,
            title:isHoriz?{display:true,text:BOTH?(t('leden_lbl')+' + '+t('kandidaten')):(S.chartType==='kandidaten'?t('kandidaten'):t('leden_lbl')),color:"#8AB4CC",font:{size:9}}:{display:false}},
          y:{ticks:{color:"#8AB4CC",font:{size:isHoriz?8:10},autoSkip:false},beginAtZero:true,stacked:BOTH,
            title:{display:true,text:isHoriz?t('jci_afdelingen'):t('leden_lbl'),color:"#8AB4CC",font:{size:9}}},
          y2:{position:"right",display:!isHoriz,ticks:{color:"#8AB4CC",font:{size:9}},
            stacked:BOTH,grid:{drawOnChartArea:false},
            afterBuildTicks:function(axis){axis.ticks=(axis.chart.scales.y?.ticks||[]).map(t=>({...t}));}}
        }
      }});
    }
  },80);
}

function canEditLeden(afd){return hasRecht('ledenAnder','rw')||(afd===S.afd&&hasRecht('ledenEigen','rw'));}
function saveLedenAdmin(afd){
  if(!canEditLeden(afd))return;
  if(!DB.afdInfo[afd])DB.afdInfo[afd]={ledenHistory:[],kandidatenHistory:[]};
  if(!DB.afdInfo[afd].ledenHistory)DB.afdInfo[afd].ledenHistory=[];
  if(!DB.afdInfo[afd].kandidatenHistory)DB.afdInfo[afd].kandidatenHistory=[];
  const newL=document.getElementById("lh-leden")?.value;
  const newK=document.getElementById("lh-kand")?.value;
  const peild=document.getElementById("lh-peildatum")?.value||nowStr();
  const ts=tsNow();const by=S.user;
  let changed=false;
  // Enkel ingevulde velden registreren als nieuwe ledentelling
  if(newL!==undefined&&newL!==""){
    const old=DB.afdInfo[afd].leden||"";
    DB.afdInfo[afd].leden=newL;DB.afdInfo[afd].ledenDatum=peild;
    DB.afdInfo[afd].ledenHistory.push({val:newL,datum:peild,ts,by});
    logChange("Ledentelling",afd,"leden",old,newL,peild);changed=true;
  }
  if(newK!==undefined&&newK!==""){
    const old=DB.afdInfo[afd].kandidaten||"";
    DB.afdInfo[afd].kandidaten=newK;DB.afdInfo[afd].kandidatenDatum=peild;
    DB.afdInfo[afd].kandidatenHistory.push({val:newK,datum:peild,ts,by});
    logChange("Ledentelling kandidaten",afd,"kandidaten",old,newK,peild);changed=true;
  }
  if(!changed){alert("Vul minstens het aantal leden of kandidaten in.");return;}
  sdb();S.modal=null;render();
}

// ── Werkjaar-helpers (voor 'nog niet bezocht dit werkingsjaar') ──
// Werkjaar-type van een afdeling: config heeft voorrang, anders het werkjaar
// van de voorzitter, anders 'kalender' (zoals elders in de app).
function werkjaarType(afd){
  return (DB.werkjaarConfig&&DB.werkjaarConfig[afd]&&DB.werkjaarConfig[afd].type)||(DB.vz[afd]&&DB.vz[afd].werkjaar)||'kalender';
}
// Begin/eind (YYYY-MM-DD) van het huidige werkjaar van een afdeling.
// kalender: lopend kalenderjaar. academie: aug t/m jul rond vandaag.
function currentWerkjaarRange(afd){
  const now=new Date();const y=now.getFullYear();const m=now.getMonth()+1;
  if(werkjaarType(afd)==='academie'){
    const start=m>=8?y:y-1;
    return {from:start+'-08-01',to:(start+1)+'-07-31'};
  }
  return {from:y+'-01-01',to:y+'-12-31'};
}
// Heeft de gebruiker (via 'visits') deze afdeling in het huidige werkjaar al bezocht?
// Telt mee: status 'gepland' en 'bezocht'. Telt NIET mee: 'afgelast'.
function bezochtInHuidigWerkjaar(afd,visits){
  const r=currentWerkjaarRange(afd);
  return (visits||[]).some(function(v){
    return v.afdeling===afd&&v.status!=='afgelast'&&v.datum>=r.from&&v.datum<=r.to;
  });
}
// ── Naam-resolver: e-mail → weergavenaam over alle rollen heen ──
function userDisplayName(email){
  if(!email)return '—';
  if(email===SUPER)return 'Admin';
  for(const afd in (DB.vz||{})){const v=DB.vz[afd];if(v&&v.email===email&&v.naam)return v.naam;}
  for(const afd in (DB.localBestuur||{})){const m=(DB.localBestuur[afd]||[]).find(x=>x.email===email);if(m&&m.naam)return m.naam;}
  for(const afd in (DB.afdLeden||{})){const byWj=DB.afdLeden[afd]||{};for(const wj in byWj){const m=(byWj[wj]||[]).find(x=>x.email===email);if(m&&m.naam)return m.naam;}}
  return email;
}
// Afdeling van een gebruiker (e-mail) opzoeken, voor context naast de naam.
function userAfd(email){
  if(!email)return '';
  for(const afd in (DB.vz||{})){if(DB.vz[afd]&&DB.vz[afd].email===email)return afd;}
  for(const afd in (DB.localBestuur||{})){if((DB.localBestuur[afd]||[]).find(x=>x.email===email))return afd;}
  for(const afd in (DB.afdLeden||{})){const byWj=DB.afdLeden[afd]||{};for(const wj in byWj){if((byWj[wj]||[]).find(x=>x.email===email))return afd;}}
  return '';
}
// Vind het (bewerkbare) recordobject van een gebruiker over alle rollen heen.
// Geeft {rec, afd, type} terug, of null. 'rec' is het object dat je kan muteren
// (naam/voornaam/familienaam/gsm/pinWj). Voor admin/bestuur (enkel e-mail in een
// lijst) maken we een los profielrecord aan in DB.profiles[email].
function findUserRecord(email){
  if(!email)return null;
  for(const afd in (DB.vz||{})){if(DB.vz[afd]&&DB.vz[afd].email===email)return {rec:DB.vz[afd],afd,type:'vz'};}
  for(const afd in (DB.localBestuur||{})){const m=(DB.localBestuur[afd]||[]).find(x=>x.email===email);if(m)return {rec:m,afd,type:'localBestuur'};}
  for(const afd in (DB.afdLeden||{})){const byWj=DB.afdLeden[afd]||{};for(const wj in byWj){const m=(byWj[wj]||[]).find(x=>x.email===email);if(m)return {rec:m,afd,type:'lid'};}}
  // admin of bestuur: profiel los bijhouden
  if((DB.admins||[]).includes(email)||(DB.bestuur||[]).includes(email)){
    if(!DB.profiles)DB.profiles={};
    if(!DB.profiles[email])DB.profiles[email]={};
    return {rec:DB.profiles[email],afd:'',type:(DB.admins||[]).includes(email)?'admin':'bestuur'};
  }
  return null;
}
// Lijst van werkingsjaren voor de dropdown, op basis van het werkjaartype van de afdeling.
// Huidig werkjaar eerst, dan aflopend tot 2000 (kalender) of 2000-2001 (academie).
function werkjarenList(afd){
  const now=new Date();const y=now.getFullYear();const m=now.getMonth()+1;
  const out=[];
  if(werkjaarType(afd)==='academie'){
    const curStart=m>=8?y:y-1;
    for(let s=curStart;s>=2000;s--)out.push(s+'-'+(s+1));
  }else{
    for(let yy=y;yy>=2000;yy--)out.push(String(yy));
  }
  return out;
}

function saveEditUser(oldEmail,oldAfd,isVz){
  const newEmail=document.getElementById("eu-email")?.value.trim().toLowerCase();
  const voornaam=(document.getElementById("eu-voornaam")?.value||"").trim();
  const familienaam=(document.getElementById("eu-familienaam")?.value||"").trim();
  const naam=(voornaam+" "+familienaam).trim();
  const gsm=document.getElementById("eu-gsm")?.value||"";
  const pinWj=document.getElementById("eu-pinwj")?.value||"";
  const newAfd=isVz?(document.getElementById("eu-afd")?.value||oldAfd):oldAfd;
  const wj=isVz?(document.getElementById("eu-wj")?.value||"kalender"):"kalender";
  if(!newEmail){alert("E-mailadres is verplicht.");return;}
  if(isVz){
    if(oldAfd&&oldAfd!==newAfd)delete DB.vz[oldAfd];
    if(!DB.vz[newAfd])DB.vz[newAfd]={};
    const r=DB.vz[newAfd];
    r.email=newEmail;r.voornaam=voornaam;r.familienaam=familienaam;r.naam=naam;r.gsm=gsm;r.werkjaar=wj;r.pinWj=pinWj;
    if(newEmail!==oldEmail){DB.pw[newEmail]=DB.pw[oldEmail];delete DB.pw[oldEmail];if(DB.pending[oldEmail]){DB.pending[newEmail]=DB.pending[oldEmail];delete DB.pending[oldEmail];}}
  } else {
    // andere rollen: bewerk het record via findUserRecord, of admins-lijst
    const found=findUserRecord(oldEmail);
    if(found){const r=found.rec;r.voornaam=voornaam;r.familienaam=familienaam;r.naam=naam;r.gsm=gsm;r.pinWj=pinWj;if('email' in r)r.email=newEmail;}
    const idx=DB.admins.indexOf(oldEmail);
    if(idx>-1&&newEmail!==oldEmail){DB.admins[idx]=newEmail;DB.pw[newEmail]=DB.pw[oldEmail];delete DB.pw[oldEmail];}
    const bidx=(DB.bestuur||[]).indexOf(oldEmail);
    if(bidx>-1&&newEmail!==oldEmail){DB.bestuur[bidx]=newEmail;DB.pw[newEmail]=DB.pw[oldEmail];delete DB.pw[oldEmail];}
    if(newEmail!==oldEmail&&DB.profiles&&DB.profiles[oldEmail]){DB.profiles[newEmail]=DB.profiles[oldEmail];delete DB.profiles[oldEmail];}
  }
  sdb();S.modal=null;S.editUserEmail=null;render();
}

function allEmailUsers(){
  const list=[];
  Object.entries(DB.vz).forEach(([afd,v])=>{if(v.email)list.push({email:v.email,naam:v.naam||v.email,afd,prov:gt(afd),role:'vz'});});
  (DB.admins||[]).forEach(e=>{if(e&&!list.find(u=>u.email===e))list.push({email:e,naam:e,afd:'—',prov:'',role:'admin'});});
  (DB.bestuur||[]).forEach(e=>{if(e&&!list.find(u=>u.email===e))list.push({email:e,naam:e,afd:'JCI Vlaanderen',prov:'',role:'bestuur'});});
  Object.entries(DB.localBestuur||{}).forEach(([afd,leden])=>{(leden||[]).forEach(m=>{if(m.email&&!list.find(u=>u.email===m.email))list.push({email:m.email,naam:m.naam||m.email,afd,prov:gt(afd),role:m.rol||'localBestuur'});});});
  return list;
}
function emailSelect(groep){
  const all=allEmailUsers();

  else if(groep==='bestuur')S.selUsers=all.filter(u=>u.role==='bestuur').map(u=>u.email);
  else if(groep&&groep.indexOf('prov:')===0){const p=groep.slice(5);S.selUsers=all.filter(u=>u.prov===p).map(u=>u.email);}
  else if(groep==='geen')S.selUsers=[];
  render();
}

function parseBulk(v){
  const lines=v.split("\n").filter(l=>l.trim());
  S.bulkParsed=lines.map(l=>{const p=l.split(",").map(s=>s.trim());const e=(p[0]||"").toLowerCase();const n=p[1]||"";const a=p[2]||"";const g=p[3]||"";const wj=p[4]||"kalender";let err="";if(!e.includes("@"))err="Ongeldig e-mail";else if(a&&!ALL.includes(a))err="Onbekende afdeling";return{email:e,naam:n,afd:a,gsm:g,werkjaar:wj,error:err};});
  const ta=document.getElementById("bi");const val=ta?.value;render();const ta2=document.getElementById("bi");if(ta2)ta2.value=val;
}

function saveAV(){
  const afd=document.getElementById("va")?.value;
  // Read date - handle both YYYY-MM-DD (native) and DD/MM/YYYY (typed)
  let datum=document.getElementById("vd")?.value||S.avModalDatum||"";
  if(!datum){
    // Try reading as text in case browser locale changed format
    const rawVal=document.getElementById("vd");
    datum=rawVal?rawVal.value:"";
  }
  // Convert DD/MM/YYYY to YYYY-MM-DD if needed
  if(datum&&datum.match(/^\d{2}\/\d{2}\/\d{4}$/)){
    const[d,m,y]=datum.split("/");datum=`${y}-${m}-${d}`;
  }
  // Convert DD-MM-YYYY to YYYY-MM-DD if needed
  if(datum&&datum.match(/^\d{2}-\d{2}-\d{4}$/)){
    const[d,m,y]=datum.split("-");datum=`${y}-${m}-${d}`;
  }
  if(!datum||!datum.match(/^\d{4}-\d{2}-\d{2}$/)){alert("${t('datum')} is verplicht.");return;}const newAV={id:Date.now().toString(),afdeling:afd||S.afd,datum,uur:document.getElementById("vu")?.value||"",locatie:document.getElementById("vl")?.value||"",adres:document.getElementById("vad")?.value||"",aanwezig:null};if(!canAttend(newAV.afdeling)){alert("Je hebt geen schrijfrecht voor AV's van deze afdeling.");return;}DB.avs.push(newAV);logChange("AV toegevoegd",newAV.afdeling,"av","",datum+(newAV.uur?" "+newAV.uur:""),datum);sdb();S.modal=null;render();}
function updAV(id){const av=DB.avs.find(a=>a.id===id);if(!av)return;if(!canAttend(av.afdeling))return;const oldDat=av.datum;av.datum=document.getElementById("vd")?.value||av.datum;av.uur=document.getElementById("vu")?.value||"";av.locatie=document.getElementById("vl")?.value||"";av.adres=document.getElementById("vad")?.value||"";
  const acties=document.getElementById("av-acties")?.value||'';const verslag=document.getElementById("av-verslag")?.value||'';if(acties||verslag){if(!DB.avNotes)DB.avNotes={};DB.avNotes[id]={acties,verslag,ts:tsNow(),by:S.user};}logChange("AV gewijzigd",av.afdeling,"av",oldDat,av.datum+" "+(av.uur||""),av.datum);sdb();S.modal=null;S.editId=null;render();}
function delAV(id){const av=DB.avs.find(a=>a.id===id);if(av&&!canAttend(av.afdeling))return;if(!confirm("AV verwijderen?"))return;if(av)logChange("AV verwijderd",av.afdeling,"av",av.datum+" "+(av.uur||""),"",av.datum);DB.avs=DB.avs.filter(a=>a.id!==id);sdb();render();}
function togAan(id){
  const av=DB.avs.find(a=>a.id===id);if(!av)return;
  // Aanwezig melden = AV-schrijfrecht (eigen afd: avEigen rw, andere: avAnder rw)
  if(!canAttend(av.afdeling))return;
  if(av.aanwezig===true){
    av.aanwezig=false;
    // Bezoek deselecteren: de AV blijft bestaan, maar het persoonlijke geplande
    // bezoek van deze gebruiker wordt verwijderd (dag wordt weer niet-geel).
    // Reeds bezochte/afgelaste bezoeken blijven behouden.
    if(DB.visits){
      DB.visits=DB.visits.filter(function(v){
        return !(v.afdeling===av.afdeling&&v.datum===av.datum&&v.by===S.user&&v.status==='gepland');
      });
    }
  }
  else if(av.aanwezig===false)av.aanwezig=null;
  else{
    av.aanwezig=true;
    // Auto-add to bezoekplanning if not already present
    if(!DB.visits)DB.visits=[];
    const existing=DB.visits.find(v=>v.afdeling===av.afdeling&&v.datum===av.datum&&v.by===S.user);
    if(!existing){
      DB.visits.push({id:Date.now().toString(),afdeling:av.afdeling,datum:av.datum,uur:av.uur||'',status:'gepland',notities:'',by:S.user,ts:tsNow()});
    }
  }
  sdb();render();
}

    <div class="modal-footer">

    </div>
  </div></div>`;}

function parseBulkLeden(v){
  const lines=v.split("\n").filter(l=>l.trim());
  S.bulkLedenParsed=lines.map(l=>{
    const p=l.split(",").map(s=>s.trim());
    const afd=p[0]||"";const leden=p[1]||"";const kand=p[2]||"";const datum=p[3]||"";
    let error="";
    if(!ALL.includes(afd))error="Onbekende afdeling";
    else if(leden!==""&&isNaN(parseInt(leden)))error="Leden moet een getal zijn";
    else if(kand!==""&&isNaN(parseInt(kand)))error="Kandidaten moet een getal zijn";
    return{afd,leden,kand,datum,error};
  });
  const ta=document.getElementById("bli");const val=ta?.value;render();const ta2=document.getElementById("bli");if(ta2)ta2.value=val;
}

function doBulkLeden(){
  const valid=(S.bulkLedenParsed||[]).filter(r=>!r.error);
  const ts=tsNow();const by=S.user;
  valid.forEach(r=>{
    const afd=r.afd;
    if(!DB.afdInfo[afd])DB.afdInfo[afd]={ledenHistory:[],kandidatenHistory:[],coords:getCoords(afd)};
    if(!DB.afdInfo[afd].ledenHistory)DB.afdInfo[afd].ledenHistory=[];
    if(!DB.afdInfo[afd].kandidatenHistory)DB.afdInfo[afd].kandidatenHistory=[];
    if(r.leden!==""){
      const peild=r.datum||nowStr();
      DB.afdInfo[afd].leden=r.leden;DB.afdInfo[afd].ledenDatum=peild;
      DB.afdInfo[afd].ledenHistory.push({val:r.leden,datum:peild,ts,by});
      logChange("Leden bulk import",afd,"leden","",r.leden,peild);
    }
    if(r.kand!==""){
      const peildK=r.datum||nowStr();
      DB.afdInfo[afd].kandidaten=r.kand;DB.afdInfo[afd].kandidatenDatum=peildK;
      DB.afdInfo[afd].kandidatenHistory.push({val:r.kand,datum:peildK,ts,by});
      logChange("Kandidaten bulk import",afd,"kandidaten","",r.kand,peildK);
    }
  });
  sdb();S.modal=null;S.bulkLedenParsed=[];render();
}

function revertLeden(afd,field,histIdx){
  const info=DB.afdInfo[afd];if(!info)return;
  const histKey=field==='leden'?'ledenHistory':'kandidatenHistory';
  const entry=(info[histKey]||[])[histIdx];if(!entry)return;
  if(!confirm(`Terugzetten naar ${entry.val} ${field} (${entry.datum||entry.ts})?`))return;
  const old=info[field]||"";
  info[field]=entry.val;
  if(field==='leden')info.ledenDatum=entry.datum||nowStr();
  else info.kandidatenDatum=entry.datum||nowStr();
  info[histKey].push({val:entry.val,datum:entry.datum||nowStr(),ts:tsNow(),by:S.user+"(terugzetting)"});
  logChange("Terugzetting "+field,afd,field,old,entry.val,entry.datum||nowStr());
  sdb();S.modal=null;render();
}

          <td style="font-size:11px;color:var(--green);">${e.newVal||'—'}</td>
          <td class="ts-small">${e.datum||'—'}</td>
          <td>${e.field==='leden'||e.field==='kandidaten'?`<button class="btn btn-sm" style="color:var(--amber);" onclick="revertFromLog('${e.id}')" title="Terugzetten naar oude waarde"><svg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8'/><path d='M3 3v5h5'/></svg></button>`:''}
          </td>
        </tr>`).join("")}
      </tbody></table></div>
    </div>
  </div>`;}

function revertFromLog(id){
  const entry=(DB.changelog||[]).find(e=>e.id===id);if(!entry)return;
  if(!entry.afd||!entry.field||entry.oldVal==='')return;
  if(!confirm(`Terugzetten naar "${entry.oldVal}" voor ${entry.afd} (${entry.field})?`))return;
  const info=DB.afdInfo[entry.afd];if(!info)return;
  const histKey=entry.field==='leden'?'ledenHistory':'kandidatenHistory';
  const old=info[entry.field]||"";
  info[entry.field]=entry.oldVal;
  if(entry.field==='leden')info.ledenDatum=entry.datum||nowStr();
  else info.kandidatenDatum=entry.datum||nowStr();
  if(!info[histKey])info[histKey]=[];
  info[histKey].push({val:entry.oldVal,datum:entry.datum||nowStr(),ts:tsNow(),by:S.user+" (terugzetting via log)"});
  logChange("Terugzetting via log "+entry.field,entry.afd,entry.field,old,entry.oldVal,entry.datum||nowStr());
  sdb();render();
}

function exportData(){
  if(!hasRecht('import','ro'))return;
  const exportObj={
    _exported: tsNow(),
    _version: 1,
    avs: DB.avs,
    admins: DB.admins,
    bestuur: DB.bestuur||[],
    vz: DB.vz,
    pw: DB.pw,
    pending: DB.pending,
    notes: DB.notes,
    afdInfo: DB.afdInfo,
    changelog: DB.changelog||[],
    inaktief: DB.inaktief||[],
    avNotes: DB.avNotes||{},
    visits: DB.visits||[],
    localBestuur: DB.localBestuur||{},
    lastLogin: DB.lastLogin||{},
    profiles: DB.profiles||{},
    afdLeden: DB.afdLeden||{}
  };
  const json=JSON.stringify(exportObj,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download=`jci-av-planner-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(input){
  if(!hasRecht('import','rw'))return;
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const obj=JSON.parse(e.target.result);
      // Validate: must have at least avs and admins
      if(!Array.isArray(obj.avs)||!Array.isArray(obj.admins)){
        S.importMsg={ok:false,text:'Ongeldig bestand: dit is geen geldige JCI LA-platform back-up.'};
        render();return;
      }
      if(!confirm(`Back-up inladen van ${obj._exported||'onbekende datum'}?\n\nAlle huidige data wordt overschreven. Weet je het zeker?`)){
        input.value='';return;
      }
      DB.avs=obj.avs||[];
      DB.admins=obj.admins||[SUPER];
      DB.bestuur=obj.bestuur||[];
      DB.vz=obj.vz||{};
      DB.pw=obj.pw||{};
      DB.pending=obj.pending||{};
      DB.notes=obj.notes||{};
      DB.afdInfo=obj.afdInfo||{};
      DB.changelog=obj.changelog||[];
      DB.inaktief=obj.inaktief||[];DB.avNotes=obj.avNotes||{};DB.visits=obj.visits||[];DB.localBestuur=obj.localBestuur||{};DB.lastLogin=obj.lastLogin||{};
      // Ensure super admin is always present
      if(!DB.admins.includes(SUPER))DB.admins.unshift(SUPER);
      // Migrate afdInfo
      ALL.forEach(a=>{
        if(!DB.afdInfo[a])DB.afdInfo[a]={};
        if(!DB.afdInfo[a].ledenHistory)DB.afdInfo[a].ledenHistory=[];
        if(!DB.afdInfo[a].kandidatenHistory)DB.afdInfo[a].kandidatenHistory=[];
        if(!DB.afdInfo[a].coords)DB.afdInfo[a].coords=DEFAULT_COORDS[a]||[51.05,4.0];
      });
      sdb();
      const avCount=DB.avs.length;
      const vzCount=Object.values(DB.vz).filter(v=>v.email).length;
      S.importMsg={ok:true,text:`Import geslaagd: ${avCount} AV's en ${vzCount} voorzitters ingeladen (back-up van ${obj._exported||'?'}).`};
      input.value='';
      render();
    }catch(err){
      S.importMsg={ok:false,text:`Fout bij inladen: ${err.message}`};
      render();
    }
  };
  reader.readAsText(file);
}

function saveProfiel(){
  const found=findUserRecord(S.user);
  if(!found){S.profielErr="Profiel niet gevonden.";render();return;}
  const rec=found.rec;
  const voornaam=(document.getElementById("pf-voornaam")?.value||"").trim();
  const familienaam=(document.getElementById("pf-familienaam")?.value||"").trim();
  const gsm=(document.getElementById("pf-gsm")?.value||"").trim();
  const pinWj=document.getElementById("pf-pinwj")?.value||"";
  rec.voornaam=voornaam;rec.familienaam=familienaam;
  rec.naam=(voornaam+" "+familienaam).trim();// 'naam' blijft de samengestelde weergave
  rec.gsm=gsm;rec.pinWj=pinWj;
  logChange("Profiel bijgewerkt",found.afd||"—","profiel","","",nowStr());
  sdb();S.profielOk=t('profiel_opgeslagen');S.profielErr="";render();
  setTimeout(()=>{S.profielOk="";if(S.modal==='profiel')render();},1600);
}
function changePwProfiel(){
  const cur=document.getElementById("pw-cur")?.value;
  const nw=document.getElementById("pw-new")?.value;
  const nw2=document.getElementById("pw-new2")?.value;
  const email=S.user;
  if(!cur||DB.pw[email]!==cur){S.pwErr="Huidig wachtwoord is onjuist.";render();return;}
  if(!nw||nw.length<6){S.pwErr="Nieuw wachtwoord moet minstens 6 tekens zijn.";render();return;}
  if(nw!==nw2){S.pwErr="Wachtwoorden komen niet overeen.";render();return;}
  DB.pw[email]=nw;
  if(DB.pending[email])delete DB.pending[email];
  logChange("Wachtwoord gewijzigd",S.afd||"admin","wachtwoord","(verborgen)","(verborgen)",nowStr());
  sdb();S.pwOk="Wachtwoord succesvol gewijzigd!";S.pwErr="";render();
  setTimeout(()=>{S.pwOk="";if(S.modal==='profiel')render();},1600);
}
